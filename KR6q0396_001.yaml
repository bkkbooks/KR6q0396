body:
  text: 行腳師居天界學者請問師行腳師曰我以生死請益無際和尚和尚令參萬法歸一一歸何處話我是年十有六歲抵杭城受戒一日見病僧放命四大不收我畏此苦人生決定難逃儻此景界忽然至我誰為代受我時發願有如大事不明生死不透而將脅臥席者永墮地獄或為身口妄求溫飽指以塑佛修寺供衆妄取信心錢財作不淨業或自作教他作及見聞隨喜作者永墮地獄我如不捨正因正念悟一知一見若以僧俗貴賤貧富好醜為利養故論說不平等法及教人如我所說無慚無愧者永墮地獄發願已疑一歸何處話務要此生見箇下落此話在胸中如填須彌啓止不安散亂不定行在途中甚是勞倦偶在座中熟睡昔所作惡知境界及無量劫來未聞未見種種造作一一發現即自思云我發願為生死行腳與麼境界豈非生死乎此夢從何處起此是一是二如此久之覺得心念純熟寂然日深月久萬法話于心上念念挨定無疑有疑有時昏亂有時寂靜然寂靜處話頭分明昏亂處話頭無有看來畢竟不以生死為切者工夫不得純熟也因思古人參學種種發願以無願不立故遂禮佛發願第一願我經無量劫來未嘗親近供養諸佛諸祖諸大菩薩諸善知識流浪生死我今既覺若得供養親近不以廣大真實信心不學諸佛菩薩諸善知識昔所難行難捨難忍之事縱外道取我身命若舉念護惜誓墮地獄第二願我今行道遇逆惡境不復憍慢懊惱當生智慧解脫捨身受身一切衆生所作諸惡所行非道願我不取彼之所為亦不厭彼之所作則當隨類為彼說法若不依願當墮地獄第三願我悟佛知見必將佛所說大乘法藏荷負無央數世界分身無央數世界之中教化四生六道衆生同圓種智使衆生聞我音聲見我色相皆獲三昧若悟後不依者當墮地獄發願已舉起話頭行至中途昏晚就路旁大石上坐不覺定去行人傳說有箇和尚在路死了來者驚我定起我欲行只是移動不得四大麻木衆人扶起漸得輕快不知幾時也自此于一切處晝夜清爽話頭明白殿堂中三門外出入動靜只知有箇畢竟一歸何處話塞滿太虛如車輪轉都無所礙我憶這話如寶劍一切境物皆無入處有僧將黃檗心要與看我接之不覺墮地疑此一歸何處話宛如死人一切所有都不知道如此這箇境界甚是難透如坐在太虛空中覺恐怖艱險作主不得正恐怖中一歸何處話忽然舉出向使若非願力深重此話頭在念定是成風成顛這僧又將心要來我謂古人說話必有得力處遂揭開再看如虛空相似知黃檗饒舌覺自己髑髏悉皆裂破就將心要燒了我通身是箇心要又念古人云做工夫要到佛祖田地作箇準則我此生務要做到大慧禪師大悟一十八遍小悟不計其數然從上佛祖皆經遠劫豈止大悟小悟這僧見我燒了心要他說蘿擁山老和尚三十餘年不出山我遂去見之自說工夫老和尚云你且莫說工夫我云恁麼莫不虛度此生麼老和尚云是我虛度你不可虛度我禮拜謝老和尚見我信心收拾空房留我住我云今日入山若無工夫而離此山者定遭虎舉萬法話疑云一歸何處復云畢竟一歸何處終日竟夜祗是與麼疑疑之日久覺得身心別無所有惟是空我境界此境界又喜又怕又無問處雖是老和尚久住山中作務勤苦不知所以我自主張不離話頭又經月久此空我境界唯覺房榻內外一切都空我即是空空即是我我與空了無二相然雖得恁麼只是無箇悟處不敢認著又思心要所說當體即如動念即乖猶如虛空無有邊際將使合我所空且無空跡終是缺箇悟處我信古人說要有箇悟處遂以悟為期又經月久經行間忽見卓案上馬祖與百丈野鴨子話祖問百丈是甚麼物當下如寶珠擊碎虛空因說偈曰遍界純真無雜豁開劫外優曇虛空七破八裂都盧無聖無凡這偈子不知如何發出此後偈頌一切處隨說隨有一日寫百十首心禪偈與人問答偈頌長短總五七百首我將古人說處印看亦有合處然終非悟門盡皆燒了惟願諸佛菩薩作證明也做工夫不到語默不干處願我生身陷入地獄又願一切衆生如我修行正念現前禪定自在我時下山途中晝夜疑一歸何處話一切處一切時只如是疑如是提忽患傷寒瘧痢整四箇月空我工夫話頭都打失了種種言語聰明解會都用不著仍護持前願恐我一旦無常未敢放脅而臥人問汝病如何答曰我尚無我誰為病主然終亦是強作主張一日忽聞僧云一切智智清淨無二無二分無別無斷故我聞此語依他所說一一推究不知是何如及問出何經典僧云大般若經我祈禱諸佛大限已盡承聞般若不昧正因臨命終時心無散亂早得出頭為男子相投佛出家禮善知識學般若法究明心地開導一切衆生若大限不盡將前空我聰明及一切異學文字盡情除去我做許多時工夫作許多時模樣打點惟有偷心未曾死得今日以我所聞一切智智清淨無二無二分無別無斷故話作箇正念以為發明此話若不發明而便捨卻當世世以我身碎如微塵入微塵獄若悟明般若大意不廣開示一切衆生不入微塵剎國教化一切衆生同證諸佛無上般若亦當入獄舉願後其病漸見輕微病既已愈將此般若一切智智清淨無二無二分無別無斷故話加疑云此話我因甚透不過畢竟因甚透不過從此發疑參究自辦久遠之心往來蜀川又經八年是箇呆漢土面灰頭齷齷齪齪受盡辛苦寒暑不勻饑飽不節去住不定人事不同工夫不一不死不活無滋無味這箇般若話轉疑轉生欲覓欲斷甚是費力轉轉到此轉轉昏沉轉轉散亂昏沉散亂轉轉太甚我身我心及我正念一向轉轉埋沒雖是有箇話頭祗是不得定力死死活活過了日期只因我宿障重轉用心轉失了因思古人所教痛加鍛鍊或罵或打至使心地灰死做到大休大歇處知解到此用心轉近轉遠轉熟轉生由此始信古人得此一著未是容易又久久方然出定我云這許多年費盡心力未得一念相應未嘗一如今日都不思議舉起正念又依前定去于定中覺得正念微密渾然是箇空空豁豁連箇正念都無所依至都無所依處正是不思議處無邊際之量又如太虛空無有一物忽聞僧云見無所見即真見我聽得此此說如太虛空碎之無跡豁然如聞百千億霹靂之作如出百千萬億日輪之照如百千萬億劫冰山融化如百千萬億劫一念前後際斷到此之際方悟無量劫來偌大窠臼頓然脫落一切智智無智無非智也一切見見無見無不見也覿體都無一玄一妙一機一用而又一切用一切機一切玄一切妙一一一切總然玄妙機用也無量劫來縱經生死一切因緣誠然妄幻大衆即此是行腳事即此是心空及第處即此是古人田地處偈曰佛法都盧只箇空且非知見立為宗十方諸佛全生滅一切群靈總幻中勘破了無些子礙悟來祗是舊時人如今又于歸方丈一任施為在豎橫般若大禪定一即一切一切即一而無種種而不無種種所以山河大地森羅萬象總印我般若之光明空色妙門諸佛衆生全承我般若之慧力無一物不說般若之法無一事不任般若之用十方佛祖盡以般若說我之一切雖然如是也不得自肯須待作家煆煉始得我說此空非學者冊子上卜度口說之空實工夫做到之空我至隆恩見先師我參學十年餘為己躬事行腳工夫做到理窮情盡十方坐斷凡聖不容心同太虛了無一法即如來清淨覺地是則求和尚證明不是求和尚開示老和尚云是那箇是如來清淨覺地近前叉手云是某甲自性老和尚云你道會得從我腳下流出我難與你證明我云我是和尚道未是和尚誤我我未是和尚道是亦和尚誤我老和尚云何不別處去我云天下有過我者我不踏老和尚門戶老和尚云可近前作禮歸位又云子實到家我正目不顧老和尚云許你許你我亦不顧老和尚云我道許你更疑什麼子既如是吾亦如是我近前展三禮老和尚云子將從前做工夫處舉似一遍供養大衆我實供說如上做工夫至見諦處叉手默然老和尚云子見諦如何與我不同我以兩手大展云這箇非別老和尚云這箇還著言句也無我云實無一字老和尚云只此無一字處吾為汝證明已竟子可深山茅蓬下饑餐渴飲任情逍遙為子安號古庭珍重珍重我遂禮辭老和尚云子向甚麼處去我云十字街頭喝佛罵祖去老和尚云子再來否我云不違和尚尊顏話畢驀直出也我時禮別老和尚就止金臺大容山雲水不絶老和尚恐出世早命首座云子別在甚處我云佛祖行不到處老和尚云還許人來否我云坦然無礙老和尚云從上古人阿誰有超祖之智我云黃檗老和尚云子見黃檗麼我云縱是黃檗也須見擯老和尚云敢在我這裏說大話我云正眼無私老和尚云觀子知見吾非子之師也我云無有過量豈免眨剝老和尚云是是我昔見古拙老師十年後付一偈云憶昔繁昌一別時此心能有幾人知無弦曲子真難續慧命懸懸付阿誰吾居川中得法之徒十有餘人正法眼藏付囑于子先師慧命無令斷絶今將袈裟拂子付汝為臨濟正眼寶重寶重我以兩手掩耳震聲一喝而出老和尚云吾道至子大典于世起身送行我則不顧由此別去法語我本初機文章佛法固是不會惟念初祖所教外息諸緣內心無喘心如牆壁乃可入道我每思豈容措手縱學百千種神變妙用三乘五教諸子百家至于己之生死都無用處佛祖典悲啓慈為一切衆生出現于世亦方便垂手將所教向本參生死上勘正是妄想宗門下無許多說但各悟自心此心若悟法自變通我常閲華嚴經至善財問五十三知識處及五十三知識答善財處一一各說一一不思議三昧妙門于問答處未嘗見有一法更經歷一一三昧門不思議海諸佛神變無央數劫說之不盡若論有法人人不增若論無法人人不減將謂諸佛菩薩諸善知識所經遠劫非一時一息修來不知心法無二人自執迷耳我看彌勒菩薩于彈指際開毗盧華藏令善財入百千萬億彌勒樓禮百千萬億彌勒座見百千萬億彌勒佛經歷而出善財彌勒無一無二亦未嘗相去我于未嘗相去處頓然會得諸佛大不思議用我作麼生會謂學者云欲要打殺且放過著令學者入學者我于不思議三昧都無所見亦無所說于無所見所說處與十方諸佛一切衆生融會于一念心心無礙生佛平等且諸佛衆生諸善知識彌勒善財于我無一法處爾等學者與他相見了也若一向說都無一法一見學者向什麼處著力宗門謂真參實悟此是做工夫最上之教到此要信佛祖與我及一切衆生皆有箇大受用妙處若實所悟與麼思議不思議一一塵一一剎一一物一一事一一心一一念總是毗盧華藏世界剎海我所說者皆從我心流出今之學者惟恃多聞泥執不通佛祖妙用及諸佛無礙諸佛三昧諸佛禪定諸佛神變死心會去苟不死心縱有言說都無所實德山一日飯遲托鉢過堂雪峰云鐘未鳴鼓未響托鉢向什麼處德山無語雪峰舉似巖頭頭曰老漢未會末後句在山謂頭曰你不肯老僧那頭密啓其意山次日說法果異常日又一僧見雪峰云是甚麼僧亦云是甚麼峰無語僧到巖頭舉似頭頭云雪峰不會末後句僧請益巖頭頭云雪峰與我同條生不與我同條死要識末後句只者是大衆巖頭果然知末後句麼據我勘未夢見在何故巖頭不識德山雪峰他二老一箇似直中掩曲一箇如方裏藏圓到此正好著眼且巖頭與麼說端的是肯他不肯他若肯他不合道密啓其意不同條死若不肯他二老當見在甚麼處只這裏大小巖頭也過不得有輩拍旨擔板漢不究宗門果有如此之高論往往妄認業識昭昭靈靈妄據高座行棒下喝且善知識果透得巖頭末後句棒棒喝喝四方八面放大光明不然無明人我一棒一喝定招惡報四大分散打入黑漫漫大衆生死事大無常迅速不可不謹汾陽無業禪師云古德道人得意後茅茨石室向折腳鐺煮飯喫過三二十年名利不干儴財寶不為念大忘人世隱跡巖叢君王命而不來諸侯請而不赴豈同我輩貪利愛名汩沒世途如短販人有少希求而忘大果誠哉是言我等惟掠虛頭妄自尊大無明三毒潛結于心逆惡境緣知無解脫據實而言舉似宗門事且不論你知識非知識除卻一切施為動靜及語默文字生死到來畢竟作麼脫去不得認著箇死搭搭向良久處妄想不得執箇轉轆轆向活脫中狂蕩但有絲毫差別見覺縱脊梁若生鐵鑄就機辨如懸河瀉水未免閻老子打入阿波波阿吒吒八寒八熱萬死萬生此謂灼然聽吾末句各自檢點偈曰昨夜蟭螟吞六合虛空撲碎落巖前山頭白浪沉兜率海底紅光燼梵天百億須彌為我座三千諸佛列吾邊任他鐵額銅頭漢未跨門來先著拳師擊拂子召大衆曰伏惟珍重門庭施設問答機緣講學宗徒禪那衲子一一吐盡野狐涎一一放下虛頭說了了知覺心心見聞物物現前塵塵顯露不該一事不涉一塵覿體全彰當機壁立了了知覺而知而覺知覺了了心心見聞而聞而見聞見心心物物現前而現前無物塵塵顯露而顯露無塵所以一事不該一塵不涉覿體壁立全彰十方任運無處不清淨本源三界縱橫無方不自己寶所彼此一切智智清淨無二無二分無別無斷故一切衆生一切諸佛亦一切智智清淨無二無二分別無斷故既一切智智清淨覓什麼佛法語言玄機妙旨但有所能即成魔魅釋迦老子說一大藏教實地獄之因列祖說千七百機誠輪回之本禪者于輪回地獄心上起一妄念謂之有佛有道有行有法則為大謗自造業因佛本無成道本無修行本無立法本無學禪者若論諸佛功德那一處不具足那一處隔絲毫學無學舉步踏著實地行無立動念則是自心道無修涉境全無妙用佛無成應事物理變通根塵諸大總為無礙解脫光明所念緣慮便能放光現瑞只是自家埋沒于埋沒處瞥起箇念向孤峰頂做模作樣誑惑人天謂是苦行頭阤謂是超群衲子更謂我能戒定身根無為清淨此等語正是作業不然習得一切禪定猶須彌山如如寂寂學得一切佛法若娑竭海汪汪洋洋以是而論亦是造地獄業豈不知法身無相量等虛空禪定佛法向什麼處莊嚴將三藏十二部放在什麼處種種神通妙用於虛空體上都用不著更于其中覓一物是佛是祖是凡是聖亦不可得更立一事為戒定慧殺盜淫生死涅槃無明煩惱亦不可得佛是報化報化非真法是幻說道乃異名行為夢境學者不信只如過去諸佛成得箇什麼事所為都在那裏現在諸佛未來諸佛總成得箇什麼事把將三世事來勘十方諸佛一切衆生都在什麼處學者不思一念普觀無量劫無去無來亦無住若是真正衲子總是佛祖現紫磨金身種種不思議佛祖境界正好截斷若不截斷被其熱瞞學者參學要在見正所見不正終始難為究竟佛祖無事無依說一切語言都無見解與人終不言是佛是祖禪者各各起箇妄念是佛是祖是經是論鴉鳴鵲噪雞啼犬吠此等在那裏發出與三藏十二部有什麼差別自是學者于淨白受用處自家點汙作知解作凡聖作一切能所見解即今聽我所說各各放下就此舉一念看最初一念念起念滅若起滅無念這一念即法身第二念即報身第三念即化身如不思議念即不可思議佛如是佛剎境界無一塵不備無一念不圓念念是佛剎微塵念念是佛剎微塵三昧理無礙事無礙理事無礙事事無礙學者舉心動念不作佛見不作法見不作知見見不作見知見見饑來喫飯困來打眠都不理論即此無一念處豈不與虛空等量祖師西來不立文字如來始終未嘗說一字古人說不是心不是佛不是物佛祖得與麼為人徹骨徹髓徹尾徹頭實無一毫佛法禪定埋沒我所說者亦無埋沒我昔參學便信古人之教放下自己無量劫來一切身心只如我之一心正念正見除此正念外再不起第二念埋沒自家及乎所見既徹未嘗不以我所見與學者說之明白一切佛祖一切衆生及學者亦如是知見以此念念融通心心無礙佛祖乃心之妄名衆生是妄名之佛號一切妄想一切緣慮亦是名號之幻化此幻化又皆人之正因正念三昧與麼勘破無一處不光明盛大無一事不解脫清淨上不見十方諸佛下不見一切衆生學者依山僧說將正念作箇主宰不勞登山涉水不須討論尋經一切禪定功德一切莊嚴佛剎本身具足不增不減佛說一切法治我一切心無我一切心何用一切法豈不是本分事也所以一大藏教謂之故紙一切諸佛諸祖如閒神野鬼一切禪意教意如痾如疣習定習慧思惟妄想凡有所說終無正見靈嶽拈花迦葉微笑剜肉作瘡神光斷臂少室安心空中釘橛不可知知不可識識山僧因衆說做工夫話不惜口過亦是不得已諸子百氏佛祖經論一斷一切斷方好做工夫嗟夫生死無常大衆歸去檢點法身無相等合虛空妙悟非文一切無礙威音那畔寂兮默兮空劫這邊明也白也淨裸裸赤灑灑不載言詮光爍爍圓陀陀絶無窠臼一一清淨之清淨遍法界無不清淨一一色塵之色塵盡十方無不色塵寂然中寂然明白處明白不著空不著有而空有真妄之何存不名凡不名聖而聖凡心事之何立一一諸佛衆生生佛同源一一古今而非古今一一無去無來無非去來與麼則山僧橫說豎說塵說剎說一切說也說不出山僧這片臭爛舌頭說也得不說也得說與不說一一總得山僧向定不定不定定處說而說說一一說未嘗說在聖不增在凡不減無去無來也要學者知箇下落大衆山僧未開口際一一見得明白分曉將山僧掀下座來爛捶一頓山僧結舌甘受衆中莫不有下得手的人有麼有麼山僧對衆一一劃斷收拾結殺了無餘蘊學者不得向山僧臭爛舌頭上討氣息若然山僧將舌頭鼓動臭爛惡氣至十方諸佛大不思議三昧世界剎海振搖十方諸佛大不思議三昧禪定坐卻十方諸佛大不思議之座演說十方諸佛大不思議三昧之慧一一諸佛不思議三昧之真如一一諸佛不思議三昧之般若一一諸佛不思議三昧之清淨一一諸佛不思議三昧之平等此十方諸佛一切大不可思議三昧皆不出禪者日用尋常踐履如果具足正因正學抱宗門向上志力行諸佛正因正學三昧于諸佛三昧外而一切妙用一切勝法一切大用一切能事以至聲聞緣覺有學無學有漏無漏大藏一藏總名生滅妄幻我說祖師西來狂心未歇不立文字遍界葛藤直指人心白雲萬里見性成佛自家矛盾學者向自家立腳處討箇端的不信我說縱與佛祖齊驅並駕認箇沒量大人未免縛腳縛手雖然恁麼說你禪者便不得就這無事中放懷穩便說心說性說玄說妙說道理說因緣苟如不除去此箇念頭如我所說一切學一切法一切因一切果大藏小藏有漏無漏有學無學聲聞緣覺更謂人間天上總明一一諸佛之光明又是錯了何也因禪者不能死心于一切佛法世學之外頓然悟去所以說為妄幻更不以生死為念學一肚雜毒做許多虛頭或假以模樣莊設或執以默然閉目心裏造作或狂蕩無忌任學者說得點水不泄偶一事不順無明人我不知不覺做到無結殺處不自覺轉此念頭只知檢點諸方更不回頭自理畢竟生死如何了也這等阿師有日熱病打倒四大發燒求生求死皆不能得開眼見鬼那時將所學文章佛法玄妙機用一一拈來全然無用古人做工夫處則不能拼命向前古人絶情意識處則不能刳腸死智肆恣妄誕矜恃所能色色無慚誠不克己形漏磨盡報業現前萬死萬生脫身無忌你學者依山僧說莫學此等虛頭力究生死危亡莫顧上古之學最初一念以期念念死心于文字之外俾以自悟既悟又將所悟拚去如癡如愚似不能言中古之學也知死心其奈餘習未定不能力行將諸家文冊相似機緣向情塵中領略步織詞翰湊合簡篇或言上堂參或言杖下喝舉時端的似悟觸境依舊還迷自瞎瞎他宗門成患近古之學而又遠矣醉心淫舌沿襲相傳盡力所言只說見聞情識邊事正因愈昧正念全無放命後例是打失人身做神做鬼目今學者而又不然欺賢罔聖濫廁宗門皆以名利為正持雜毒為正授所謂大妄不畏因果任意死生甘心罪業大衆不覺忉忉說許多話誠無利益看他古人一語一默一機一境得為學者掀翻無量劫來以至今日所作所為解粘去縛屈己就人盡機發用豈似我溫飽無厭行解不嚴以少偷心而望大業然我對衆所舉我亦無著面目處況文字語言之乎者也茲因衆請以實供陳不可不知努力珍重禪門的示無過教外別傳絶口絶耳遍法界性示等虛空不絶思惟全機觸脫大衆吾宗諸老大凡開示拈提以一喝不作一喝用為宗門之的要多少漏逗至于打拂敲空謂單傳法好不慚愧老僧對衆效古人也打一拂喝一喝且道相似不相似似與不似置而勿論只如十方諸佛歷代祖師天下老和尚向這一拂一喝上不敢正覷一大藏教千七百機及餘諸子百家總用不著山僧將古人盡機行不到處盡力提不起處不惜情說欲與祖師證明不立文字直指人心見性成佛之意山僧舉一喝一拂就作此用勘之得透透之得過不妨盡大地是學者自己寶華王座動步無非踏著脫體是學者自己丈六金身天上天下唯吾獨尊釋迦老人以茲之說向靈嶽拈花平地陷坑迦葉微笑果然落塹教外別傳將謂多少奇特漏笊籬破砂盆雖然且不得作尊貴看我與禪者說謂證明不立文字之意畢竟大意在什麼處看來祖師也不著便為他人事九年苦苦面壁及回逼二祖師斷臂甚死急即此一拂一喝又向什麼處說話欲得親切須是自家工夫做到此事至禪者分上端的有放處無放處邪至山僧分上端的有用處無用處邪祖師分上端的有證明處無證明處邪豈不知古人用處則當人用處未嘗一毫差別佛說一切法法是心用除我一切心心是法體我無一切心心即是法何用一切法法即是心山僧向禪者說實不是說了便休直欲大法明祖關透始是到家地位其或祖關不透大法不明盡百劫千生學得千經萬論妙用神通如阿難目連馬鳴龍樹若不死心做工夫總名生死妄想有何益哉生死事大無常迅速如喪考妣如救頭然誠為險也勘他古德行棒行喝一機一用如擊石火似閃電光如此作用恐學者停思停想擬議之間千里萬里與麼費盡心力必期學者向佛祖未開口前全身擔荷既擔荷已緘唇封舌孜孜禪定所以古人箇箇于生死岸頭猶白日青天佛祖獨言教外一著忒煞慈悲于一切時一切用盡在學者語默動靜中同學者于無量劫來著衣喫飯屙屎放尿亦能為你放大光明轉大法輪學者心念與他打成一片下死力拚性命做工夫見箇下落不可放過若放過百千萬劫難似今日釋迦老子四十九年橫說豎說剎說塵說山僧所謂一拂一喝處縱橫獨步千變萬化種種奇特你學者聞山僧說不得作無事種種著到古德云學者看千處萬處不如實看一處若看破一處則千處萬處自然一一透過山僧說箇譬喻此事如鳥抱卵孜孜于動靜處不失所抱抱來抱去時節忽至殼漏子七零八落中間跳出箇活潑潑的來便能知其饑飽一動一靜久久羽力皆全又是一番無礙南北縱橫高低遠近飛騰任意確然之理千經萬論也只與麼說除此再無別事較量不然縱通三藏窮盡五車及餘諸子百家若不死心故工夫有箇悟門總是外事華嚴經云如人數他寶自無半錢分山僧也曾討經論學機緣到這裏都無用處川老云欲知端的意北斗面南觀透過殼漏子七零八落透不過非但學者任他川老也難分疏山河石壁草木叢林卻會此說古今先聖盡被瞞了若在此看往往埋沒離此別說而又不然天以之高地以之厚佛祖以之相續慧命接物利生山僧以之日用施為逢場作戲學者以之之乎也者語言文字百姓以之坐臥經行著衣喫飯于事于理果然親切既知正好高坐蒲團屏絶人事主賓不立朕兆勿存如空中月無水不形無處不照然後于火爐頭向金剛眼證據單傳以報佛祖無報之恩化人天無為之化大道廓然體無清白遍一切處不落有無在凡在聖凡聖一源非去非來去來一致山僧為學者普說于語言文字之外各各領會伏惟珍重大凡行腳脫生死超佛祖明心地其實無心可傳豈可口授貴在當人辦鐵石心立腳穩當觸聲色遇境緣或善或惡須要作主打併自己看果有甚麼堅固處與麼一看視如死人除斯再不起第二念頭向上一路千聖不傳實欲自家作其轉便莫若死心做工夫最為切實且今向我所說做工夫處勘得徹向使百千臨濟德山同時下百千喝揮百千棒其實難以近前審夫一大藏教千七百機世諦語言文字總是生死窠窟莫若懸崖放捨身命提無字究他明白分曉參他端的下落得力不得力一靜一動正念相應不相應參究要如實打點不可輕惑有輩學者不知參究謂坐禪是癡禪守默提死話頭我輩切不可依例謗說古人箇箇因提死話死得心地我輩不曾死心做工夫便乃承當說大話妄取因果山僧勘來總是釋迦達磨如此之說欲死其心無如無字死得學者心地發明得學者新機活用是以一箇無字誠死心得力之三昧豫觀從上佛祖死心禪定勤苦纍劫學者即今向熱鬧鬧處冷冰冰時提死話頭勘提時有間斷無間斷打點得歷落親切冷冰冰熱鬧鬧動靜昏散宛然只是一念念起念滅更無起滅之相此是天工克成將欲至家受用處若論做工夫到與麼時正好憤憤莫顧危亡大啓疑情大發正念不提自提不舉自舉活潑潑無一事當情當知此事不可認著文字語言以理自障或執自妄念一向守空昏昧莽蕩諸佛出世不可救也禪和家須是坐斷佛子舌根透出死生因果縱橫自在饑來喫飯困來打眠將山僧所舉盡言極則處審其所言一挨挨定自然沸湯停瀾當空日駐身心境物融然無雜空而玄寂而妙無前後際非去來相到此田地方是工夫成心悟地此際不見一念是諸佛衆生生處不見一念是諸佛衆生滅處不見一念是有生滅無生滅處一大藏教千七百機世間出世間法用亦得不用亦得到此方不被語言文字籠罩方知山僧所言古人念念在定于生死不亂今人念念在亂于生死不定山僧嘗以此語抱懷未肯輕肆自己一箇正念亦不敢以歸山住院瞞初機參學所見未敢望于古人因與大衆較量不覺忉怛伏惟珍重若論向上一著了無別說惟當人本自具足文字經論且無放處近來諸方學者盡被古人舌根埋沒不能決志透脫開口處情塵知識學解聰明于自受用中確無的實豈非自喪己靈爾若不信有日病打將所學所抱抵當不去那時方悔錯用心力學者既是實為生死行腳豈可高心執見聞恁麼說便憤志決透去便拚此生大捨身命做大休歇工夫當知此事非小因緣必猛利方能入劄且諸方老宿說做工夫于自究竟處或一年半月一月或三年五載有些見解或聞師家舉似或看冊子便認著業識做模樣生大我慢便效古人行棒下喝瞬目揚眉學者不知被他惑了此箇樣子正是生死無明若或真參實證卻不恁麼向本分中綿綿密密下死志做將去莫論年久歲深一念子撥之不開蕩之不散時節到來豆爆冷灰天翻地轉打破疑團虛空粉碎方是自己大光明處大受用處自然頭頭無礙物物全彰了無一法可當情說這邊那畔通明透徹凡情聖解宛爾一如盡十方世界森羅萬象總諸佛清淨無礙三昧到恁麼田地說甚麼文字情解根根塵塵悉是大光明寶所有時攝十方諸佛光明入一微塵光明一微塵光明現十方世界諸佛諸佛非來我亦非動寂寂如如無彼無此諸佛具大清淨無礙三昧大解空寂滅三昧大不思議海種種三昧乃至不可說微塵剎數剎塵塵剎一一具足十方諸佛定慧三昧于一毫不從外來嗟夫學者于初立志處擔荷一擔經書字句口耳傳習為其己見認為古人用處古人卻不如此語默動用別有生機豈等閒共與卜度須是具大根器者聞必敬信生難遭想其或我慢矜高退之遠之珍重諸方學者為生死請益做工夫于做工夫處實不曾得箇簡要定格往往虛度經云狂心不歇歇即菩提學者參究便歇其狂心依經所教將所學文字佛法及世間欲愛妄想截斷勿存一毫古云拼得一條窮性命銀山鐵壁也須通向前著力將所教歇狂心處作個定格依而行之極是簡要既知提一則話或萬法無字自去下疑默默理會至所下疑理會處切勿自作知解以偷心待悟念話無疑以此做工夫歇狂心確無相應今為汝保任此事終不虛也無字話趙州意作麼生無萬法話畢竟一歸何處然我所說明白苟不歇狂心縱有定慧亦只徒為喻服藥要忌發物病者學人無量劫來業識生死是也藥者無字萬法是也發物者狂心念念相續是也蓋萬法無字古人一時應機如人問我一事我必有一事相答古人說時實不曾教人言語上用心欲其直下承當千了百當若得得設此亦是錯了趙州古佛因僧問不得已將錯就錯然將錯就錯大藏教亦不出此又謂做工夫下疑著力非趙州所教卻是這僧日用目家作計後之學者依如是做未有不悟入妙理真際嗚呼學者往往立腳不定志念不堅雖參話頭實不曾有一箇決定信力才蒲團昏散二障通身著到因此討頭不著志念稍微便生退慢只箇退慢將謂我乃博地凡夫且隨例看幾行文字不虛度日山僧看來彼之所事正是虛度光陰流浪生死豈不聞如來訶阿難汝千日學慧不如一日學道所以退慢生則懶墮至懶墮至則狂念起狂念起則撥無因果無所不為尋箇真實做工夫的人誠然少也學者將我所謂或無字或萬法如實而做又看我簡要之格及昏散藥忌一一頓放八識田中再向得力下手處討分曉骨取雲門扇子跳上三十三天觸著帝釋鼻孔珍重示衆向上一著固非小事惟當人極參然後極悟其或未委于聲色空有妄認業識為己道眼不明埋沒自家更惑他人當知佛祖一言一默一機一用痛與發明向上事不是你情識伎倆但一切時內不起心外不著境境空心寂絶思絶慮直下領悟頓超佛祖惟我一念一念然則一切念念念然若只向情路上立文字學知解所謂知見立知即無明本法華經云佛謂阿難彼此空王佛所同登菩提爾樂多聞我勤精進是故我已得成菩提智者忘機時者恣說智者空見昧者泥文智者無著昧者固執不知語言文字知覺見聞諸子百氏總生死輪回種子經云以輪回心生輪回見入于如來大寂滅海終不能至佛之妙見見無所見學者把自己業識放教空去然後向佛祖教人行處務欲與之掀翻見其端的再將自己妄執心識念處直從根本截斷念茲在茲孜孜勿間于無間孜孜處痛加一憤直猛向前不覺打破漆桶大地光生灼破虛空面門觸瞎如來心眼參悟到其極則敢保向十方佛祖頂門上行住坐臥無奈你何不然莫道山僧不預前與學者說破世間至大惟生死珍重法身充滿體遍河沙妙用無窮一真獨露諸仁者若向己躬下有箇出身之路何必山僧嘮嘮叨叨汝等東卜西卜若無這箇消息未免向第二門頭說葛藤去也兄弟家既為釋門子勤修般若正因放下名利虛頭的明祖佛大意到這裏無明人我徹底掀翻貪愛是非盡情截斷然後近良朋親善友究單傳明教外時時檢點刻刻提持心心無間念念密綿剔起眉毛不容走作忽然一念相應管取慧光獨露如是修行吾門真種近來兄弟家理不明道不務貪著愛染我慢高矜種種無慚恆誇能所不惜心行一旦惡業臨頭那時悔之晚矣勸兄弟家從今改革前心依附老成道德勤勤究明生死不離本分自然道香有日更有一等上座人前做模打樣裝神捏鬼見人有些開解他便生慢恨不滅除及至觀他行履通身是箇黑漆桶子一生為人只是恁麼伎倆或有箇漢為他除病向他道箇未在他便生恨恚無明大起口裏非言全然不顧以這等病根佛也為他除之不去兄弟家修行要明自己心地到一切處也須知因識果凡所作為皆屬生滅若論真正行腳之理先欲打併得意根空豁豁地不存微念然後參方要擇伴歸衆看鄰單不是在道之人切不可與其同行共坐若不與麼檢點有失道業若是上根利志之人終不效他小輩所為縱有些小見解于諸方老宿門下一一入他爐錘鍛鍊是則深山保任未是還去打點舊日做工天處倣古人行履斷卻自己命根不得鹵莽為人壞古龜鑑你看他從上古德為人處出一語蓋天蓋地只欲人人實到恁麼田地達佛知見覺悟群生若是大丈夫漢聞恁麼說話不問得失撒手便行通身透底一一放下然後拔卻心肝抽出五臟只教他胸次中乾乾淨淨方可少分相應從此向去也不尋問別人放下面皮務要將生死做一件大不了的事古人淆訛公案顯密門庭盡平生之力一槌擊碎那時文章佛法從金剛眼裏一一流出大機大用取之無盡大辨大才用之無窮到這裏何用區區學解事業有時將丈六金身作一莖草有時一莖草作丈六金身用恁麼說話須是行到始得若非自證自悟到這裏如說夢相似經云唯佛與佛乃能知之參禪人光陰易往業報難逃不如打點自己生死急去做工夫也是遲了莫待四山到來那時整理不下這箇事務也須是平日看得破尋常作得主于生死岸上方得自在若非與麼縱爾種種學解問一答十問十答百大限到來難敵生死審之審之禪宗的意無證無修佛祖傳心絶文絶字法界之性猶若太虛不動纖毫真空絶點乃佛祖之密傳實當人之領悟所以大地是箇解脫之門通身是隻金剛之眼說玄而玄不能到透妙而妙不能通覷之無蹤窮之有失雖然恁麼說話也要實到這般田地始得不是恁麼人豈明恁麼事畢竟事何如若向這裏具一隻眼何勞佛祖出定口喃喃地說道說理說心說性且看他佛未出世祖不西來還有道理說也無還有心性說也無到這裏不如于己躬下親見徹去若是伶俐漢于自己本分事上一看看破始知乾坤之內宇宙之間有一輪無價之寶晝夜放光輝天鑑地一切衆生本自具足不假修持一一現成任汝在情塵愛網之中一靈妙性尋常顯露情塵愛網與他各無交涉恁麼所言然非說了便休也須于二六時中向鬼窟裏著些精彩務要尋箇出身之路切不可聞聲執著見色承當若然大法未明祖關未透用盡辛苦總是生滅如從上古德施設之處行棒行喝全賓全主殺活歷然收放自在如擊石火似閃電光恁麼為人皆參活句參學人須是實到這般田地方有如斯受用若非恁麼于他古人一機一語卒不能了到這裏于己躬下一段風光切切思思務要討箇分曉孜孜密究若十年二十年不徹心地山僧代汝受一切苦經云所在之處則為有佛恁麼看來豈用十年二十年一念回光早自具足正恁麼時什迦老漢在汝等眉毛上放大光明若向這裏見得便知釋迦與迦葉大意非在花笑之上畢竟在什麼處咄人人眼橫箇箇鼻直無量大人面門光聚諸仁者到這裏見須實見悟須真悟臨濟云面上無位真人趙州云庭前柏樹子天龍舉指石鞏張弓德山棒祕魔叉此是諸老為人揚向上宗乘的樣子蓋從上佛祖人人見諦則一各各拈弄不同所以云看千處萬處不如實看一處若看破一處則千處萬處自然透脫如川老了云欲知端的意北斗面南觀此是這老漢老婆心切若是靈利衲僧便知端的到這裏莫論北斗休說南觀只向他未搖唇動舌之前一看看破便知他說那漫天之謊恁麼看來豈有他下口之處莫不山河大地草木叢林古今先聖天下達道盡在此一觀破了也天以一觀而普蓋地以一觀而普載佛祖以之而接物利生衆生以之而建立萬緣如斯見得這一觀親切便好休歇度日有無俱遣證悟莫存淘汰得這乾坤如水底月相似任他風浪掀天我自凝然觸之不散若時未至待龍天推出方可為人向火爐頭究竟一箇半箇以報佛恩于金剛眼裏留得一機半機提掇末運諸仁者向這裏不知端的承當不下且將本參之話于動靜中默默自看是甚麼道理切須仔細不可放過到這裏若起一念放過之心劫劫生生被這放過的心埋沒己靈了也苦哉非但劫劫生生展轉無有出期忽有箇具眼漢出來便問即今甚麼處是這放過的一著子山僧到此只得將錯就錯作話會去也昨夜須彌山被鐵牛吞卻只得老達磨覓東莊王老問取西來意山僧不惜各與二十粗藤去會麼到如此界分明見徹不勞後語其或未然諸仁者目今被葛藤引入鬼窟裏去也大道湛然本來廓徹遍一切處有何面目這一著子在聖不增在凡不減凡聖一源無殊無異到這裏擬欲播揚祖道提唱宗乘只得掀倒虛空名重四海踏翻大地道振諸方恁麼為人方乃奇特諸仁者于此散去各各尋箇方便處安身立命免被閻羅老子追魂受拷吾書一偈以證後來若然會得再來喫棒偈曰脫殼烏龜騎鐵馬威音那畔獨瀟灑翻身撞倒五須彌縱橫踏殺四天下為四衆說戒諸佛之戒妙契一心蠢動含靈本來無缺然則蠢動含靈舉體是戒況人天四衆而不具乎此戒即汝等一念清淨之心也當知心外無戒戒外無心心即本源之戒戒即本源之心擬欲別求無有是處到這裏一念回光徹見心源了知全體是戒若或不信向外投塵非吾門之正宗也戒實佛祖之根戒乃衆生之本未有離根本而獲戒者當知戒無形相戒無莊嚴于心無漏全彰戒體吾所言戒非涉律儀未名條目實汝等本源清淨之戒德也此戒不屬有無非存持犯汝等才出母胎早自具足到此仍于面上栽眉畫目豈非大錯梵網經云一切衆生受我本源清淨心戒教既已明若于文言紙墨上受得將來于菩提心戒終無有實此戒不擇妍醜及與根缺之人但具靈識本來是戒若能妙契于心與佛無異有持有犯是二乘之戒無犯無持是最上乘之戒此戒謂一切衆生本源妙心正戒從無量劫來淨潔光麗即今人人眼目定動心戒大彰到這裏且道是持是犯若也恁麼見說于一切處自然明明歷歷何曾點汙他來若舉一念于心外求受別戒早自埋沒己靈蓋此心戒者的體淨潔了無纖染縱使盡大地都是箇糞坑與我本來心戒實非相犯為汝等無始劫來至于今日迷頭認影捨己投塵勞他佛祖出定設其對治演規立矩然乃用心大切遇過量人看來一場敗露何故我非貪嗔癡奚假戒定慧我心無生死安用大涅槃我心非散亂何用奢摩他我心本寂滅未假求禪定若能當下發一念金剛不退之心單去究明本源心戒舉此一念得戒已畢更說他恁麼戒之所犯戒之所持一空一切空一淨一切淨汝等聞說諸佛本有心戒不能斷疑如盲聾瘖啞山僧未免重為開演顯露真圓使汝等得入其源獲本心戒昔世尊說四衆所受戒文各有次第如比丘戒謂二百五十條比丘尼戒五百條優婆塞優婆夷各五條菩薩有大乘十戒如來有三聚淨戒然種種所演差殊實乃如來悲念所流教謂多種一念淨心實非二三教分頓漸心無能所如教云心生則種種法生心滅則種種法滅又云佛說一切法度我一切心我無一切心何用一切法心法並空如大圓鏡山僧恁麼切切非誑汝等汝等于此痛發廣大信心定獲廣大受用汝等幸聞律外之戒實非小可三世諸佛因此戒而成等正覺大轉法輪一切諸生悟此戒而達本源脫生死海戒源功德神鬼莫量戒源蹤跡人天莫測戒源貌相佛祖難窺到這裏十方諸佛百億菩薩無量人天種諸福慧于此本源淨妙心戒所有功德于百千萬億分未及一分若恁麼便見得去了知盧舍那即汝等之本身也山僧到此說戒將畢未免于諸人分上通箇消息擊案一下云陝府鐵牛心膽碎嘉州石象頂門穿會麼汝等向這裏領會得不勞舉足佛祖同源無持無犯非戒非心其或未然切忌撥無因果教云五戒不持人天路絶珍重心要此心清淨人自不知有此清淨此心明潔人自不知有此明潔清淨明潔本來成現今更不假修為而復成也才出頭來早自具足但能返照不假言彰所謂清淨明潔之心于一切衆生分上未嘗不在無蹤無跡絶翳絶痕至堅至固至清至淨至虛至玄至明至潔無滲無漏無大無小非出非入非外非中量之無邊窮之無所玄中唯玄妙中極妙玄玄妙妙妙心金剛說此心者說無說之心心無心之說說說無說心心無心無心心無顯一切心一切心即一心之心心即一切一切亦無一切無心無心亦無亦無無心無心心心心心心心悉皆空幻到這裏假使大悲菩薩具八萬四千手眼運八萬四千神通提之不起覷之非見劈之非破鋸之不分亦任劫火洞然此心絶纖毫之損大哉此心心心無覓唯人親證乃知過去諸佛已說現在諸佛今說未來諸佛當說蓋十方諸佛不離此心成等正覺十方諸佛不離此心轉大法輪十方諸佛不離此心入諸苦趣中救拔一切衆生離苦得樂至諸佛所聞此心法豁開心眼得諸無礙見十方佛在在處處不來不去一念現前此心空寂寂寂心空空空心寂空寂寂心寂心空寂且十方諸佛于此箇心上具種種作用現大神通大抵為一切衆生明示此心一切衆生諸塵悉淨除此之外更無別心明此之心更無別說此心不立纖塵自然虛靈絶妙但能默契忘緣全體真空獨露吾觀一切衆生種種造作種種顛倒墮于萬類之中一靈妙心實無絲毫之缺經行坐臥承誰恩力喜怒哀樂豈假他光一動一靜一飲一啄一言一默皆是自己之妙心運用無差去來有據如斯看來諸佛衆生同一妙心心心非二真心寂滅若大虛之無形慧見靈通猶澄淵之湛碧但此心非義理之說非文字之解非引教而通非能所而見到這裏須是佛祖未出文言未露天地未判古今未通平坦坦的光淨淨的于本分中忽爾心開突出一路方始相應若非恁麼至慈氏佛下生也無棲泊處只要于自己分上悟此妙心不得離己別尋設有所得非自己之心此心無青無黃非赤非白非名非字非相非貌此心遍十方剎來去無相山河石壁不能阻礙此心非天地測其機非鬼神知其量到這裏自己尚無趣向況天地鬼神而測知者哉設使佛祖同源亦覷之無分所以此心是箇大光明之寶無修無證無得無失無生無滅無老無少無穿鑿無處所巍巍蕩蕩寂寂如如諸佛之尊千聖之上不可比不可喻一切衆生全體具足妙淨明心本圓真有到此切不得于語句上承當文字中生解不得廣覽群書以教印心不得記持問答逢機酬對須是自己胸中蓋天蓋地貫古貫今一一流出始得經云唯佛與佛乃能知之然乃恁麼吾有句驗木人眨眼諸佛盡睹光明石女動唇菩薩皆蒙究竟三昧玄章吾觀大地衆生一靈真性觸物現形遍法界中頭頭顯露六根門頭放大光明四幻城中全彰法體乃佛乃祖惟此心傳列聖列賢單明箇事立妙立玄言機言密即妄即真于理于事說有說無指空指色非心非佛是佛是心以言顯空以空著言指物明真借事彰實或戲或笑或語或默或棒或拳或噓或喝或粗或細或呵或叱或歌或舞或進或退或逆或順或豎或橫或定或空或禪或亂或異或邪或塵或俗或淨或穢種種相貌種種術幻種種言詞種種揀擇種種巧機種種應答乃至天地日月星辰江河園林草木石壁瓦礫淨不淨界有有無無聲聲色色無有一物而不現此三昧實相良由衆生因無明貪愛而不能證入所以劫劫生生展展轉轉埋沉己靈失真三昧誤入六道往來四生受種種苦求出無期此三昧體唯人一靈曠大劫來未曾少缺所以佛祖眼不耐見從三昧大寂定中強出頭來不惜泥水興慈運悲設百千萬億種神通方便使人人于意根下究此三昧清淨真寂之光明除此別無有念到這裏若能捨幻投真遠塵近寂于日用中討個分曉豁然一念相應了知諸佛無心三昧即自己無心三昧塵塵爾劫劫爾總是這箇無非三昧且這箇道理于此作麼生承當體廓太虛了無邊際不動纖塵非中非外到這裏若乃存其微念天地懸遠譬如太虛之中空無有量若住一物非太虛也諸佛國土其理亦然一切衆生本源如是洞然清淨不立毫塵光遍十方無有相貌諸衆生心含褁三界現三界心總一真定到此非得非失無幻無真唯一靈明寂然三昧一切衆生既知人人分上具此無心三昧到這裏于二六時中默默照看看來看去看到看無看處自然有箇到家的時節若能便恁麼會去別無餘說設有所說無過于此當知諸佛設法無法為法衆生欲契無法為體大般涅槃經云無法可說是名說法設有智者審諦思惟若能深信斯言管取悟佛三昧有日矣警徒子既痛決死生從今日去永絶學解純一真潔務要今生作箇大漢向佛祖頭上橫眠倒舞切莫蹉跎懶墮貴圓溫飽聞恁麼說便乃豎起生鐵脊背大開無情冷眼緊捏拳頭高舉正念念茲在茲勿容分毫走作心中憤憤疑上加疑直教這一念子劈之不斷蕩之不分久久定力現前四威儀中忽爾忘卻東南西北到此之時正好著力痛加精進若也孳孳不捨忽然撞倒崑崙掀翻大地直得十方諸佛歷代祖師天下老和尚于這裏無出氣處仍使六道四生情塵根識放大寶光同一受用若實做到與麼田地方顯衲僧家超群越格的手眼其或不信今日也恁麼明日也恁麼驢胎馬腹裏決定放你不過老僧預前與你說破珍重勉之訓徒子既實心向道但看古人一則話萬法歸一一歸何處須知此事庸愚之輩實難相委大力量者方堪履踐此處不得今日提明朝放將意根下萬緣盡情放下平日捨不得的須要捨卻平日放不得的須要放卻平日離不得的須要離卻且捨不得的貪嗔癡放不得的無明人我離不得的恩愛利名而已若謂十八界所蘊塵緣雜染未可枚舉今略言之以破其毒惡子既知已大發信心立金剛志盡平生做箇沒伎倆漢莫管人說你癡憨直去著實參究須知此事如一人與萬人敵相似若非具猛勇心如何近前又如一人不執器械欲搏猛虎相似若怕危亡如何與他相見又如一人擔一百二十斤重擔溺于深泥若不加力求出如何到家既知生死恁麼大險于十二時中不顧危亡大捨身命的的確確務要見箇分曉又須知此一則話于一切處皆可徵究迎賓俯仰著衣坐臥提瓶放箸運水搬柴痾屎放尿登山涉水斸地烹茶靜鬧間忙喜怒哀樂總看箇話頭恁麼久久自有箇好處到這裏切不得于話頭上別生異念且這念是甚麼是當人避喧求寂處也如叢林中講究這做工夫一節多謂尋箇靜辦處穩坐去好教你知道且觀盡大地乾坤那一處不喧喧穰穰當知此世界乃五濁之界實無一處有靜其靜在于己心之上到此一心靜則多心靜一念寂則念念寂今時兄弟家不知有此方便強要尋箇靜處不知起一念向此世界中求箇靜處早自是箇不靜的心也山僧昔年行腳于蜀往來十載並無一茅遮頭單包隻杖各山討些現成茶飯度日任有一切諸惡風景我則不采恁麼孤切方得此一著子明白如今兄弟家未曾行腳先慮衣食于一切處務要尋箇穩便去處十年二十年不明心地被此一念障阻道眼子去切忌恁麼詢問虛實好醜逐日工夫時時檢點一日要勝一日一時要勝一時恁麼綿綿密密一七日二七日自然純熟到此不得念話無疑提時須要字字分明說這做工夫之理大抵要這話頭明白疑情易發若疑情發現昏散則退昏散既遠疑來疑去時節到來不覺撞倒露柱打破漆桶直得乾坤哮吼海水飛騰泥牛吞月鐵蛇吐雨木人撫掌石女心穿若到這裏方知達磨西來費盡神機及至歸去分文不值若實到這般田地更說甚麼萬法歸一一歸何處盡大地是汝痾放處于這裏也無道與汝說也無禪與汝參也無佛祖與汝超也無人天與汝度縱橫順逆左右逢源到此便是一味清淨平等三昧之門聽吾一偈精研慎究勿容絲直透威音那畔機豁爾洞明心地印溪山滿目笑咍咍
