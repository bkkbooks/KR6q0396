body:
  text: 論知見證性此論獨以見性為閫要可即知即見不可離知離見離知見是謂捨己投塵即知見是謂認賊為子當知真見真知知無知知見無見見了知見無即無離是真知見也知非知則知知無知不知知亦知知矣見非見則見見無見不見見亦見見矣人為知見所迷子為知見所悟人迷知見而失知見不知知見之所以豫悟知見而頓證知見能知知見之所以人以知見為別知見見則迷矣子以知見而悟知見見則悟矣心佛衆生三無差別般若經云無二無二分無別無斷故此理非出常情非不出常情卜度大難摩索蓋知之者謂見性見之者謂知性非見性而知性則無以為知見一見性一佛祖相承以來不為別事以心印心心外無知以法印法法外無見見知心見知見知心如鏡照空似空涵鏡無變易無隱顯無暗明無色空不可滯知于寂滯寂則知見見知而著偏斷不可任知于情任情則見知知見而恣物欲不可求之于有求有則有諍論不可取之于無取無則落因果可以實悟可以真參未見性者被知見所縈已見性者以知見為用如鳥搏空卷舒自在乃佛乃祖未嘗見一人以文字知見而續慧命者大凡明見己性者絶情妄捐利名甘心于寂寞苦志于精進舉一話頭念茲在茲至此徹見性原心空法泯知見無餘到此始知佛祖所教誠不虛也經云知見立知則無明本知見無見斯即涅槃今我所著知見論乃正知見非別知見靈兮昭兮道在文字之前寂兮默兮性著知見之外巍巍乎運騰三界任佛祖之崢嶸蕩蕩乎順逆十方超龍象之蹴踏道名亦非立何為見性實虛無不屬真有是知執知見者不明己性被地水火風之所拘管愛欲不除隨他遷變或若氣散魂飄決無下落子云見性以性知見則一無二無三親達原底不然論于口耳卒不能了蓋性乃太虛之空了無涯際性猶湛海之澄實乃淵廣迦葉一笑世尊付旨于機前神光作禮達麼繼命于言外古今諸老獨以見性為宗遞相傳證或豎指或伸拳或揚眉瞬目或輥毬擲杖或舉拂拈槌或掌拓相呈或棒喝點示打鼓吹毛搬泥拽石以至張弓持杈語默呵叱作多種神變蓋諸祖婆心太切故以真見真知覿面當機交付學者不許佇思一肩擔荷學者果見性于機緣動靜之外了心于文字語默之前方知諸祖盡力處恩大難酬其或不然千劫萬劫且若緣見知性性無性所因何立見若緣性知見見無見所因何立性若言不見即同生盲若言有見是為他妄去此二途性何所知這裏縱佛祖舒廣長舌放大光明確難下口何故以我知見而知見亦無無亦無亦無無矣書拜母子出家行腳失孝養背慈育倏忽二十餘年為罪多矣雖然百年幻影無過一期苟奉如來教登佛祖位出生死輪將無量劫來冤親平等況父母邪母既捨子為僧依佛所言出家功德莫可涯量此之功德皆歸於母勸母從今以後返觀自身四大本空因情故有以致生死相續母但觀我我我如空妙相渾然當體即佛母以真際為子子以無見侍母母子既空心情智寂惟我老母妙性真常性者即子即母性等虛空廓無邊際虛空性中別起一念母子情愛之見早自繫心于輪回生滅之根本也若就見中著倒念念不忘至于六道四生從劫至劫了無出期矣望母一切處一切時一切念但舉一佛號這一聲佛實從我母心地流出母不必多念惟看這一句佛出處無起絲毫想于之心若起此心則錯過這一句佛也母于這裏但記著念頭也莫作佛想也莫作子想及一切妄想一切頓除只此頓除之念亦莫在念當念處即得身心頓融如虛空相似母與麼見則為十方諸佛佛心之所見也子即母心母心即子世出世間不捨諸佛同為眷屬蓋諸佛菩薩亦皆從凡證聖知一切空而不住著于不住著而非厭離心得自在永超生死蓋子為十方諸佛之子母為十方諸佛之母以母之一念總持十方諸佛之威德故以子之一心具足十方諸佛之真智故母之念與子之心無差子之心與母之念無別母與諸佛同坐一光子與衆生實無二見無彼無此無我無人智齊一切一切即智智智恆智了無間斷心超諸法永絶生死法以心明智以法遍法智一空一空空空了見如斯則佛見也其餘情妄親愛子久忘矣老母高萬福通壽兄古松和尚書別來已久形流四散寂寞甘懷補敵遮寒潛心密用掃跡煙嵐大休人世奉先德念念在定之遺誡拼盡命根死其心地生滅幻妄委具寂然者也若道眼弗明祖關弗透擔生死于顛危終無他念矣蓋為僧者非枯生死海釋空有心佛祖大恩莫由可報故灰頭土面如大死人日夕孜孜惟一無二不知不覺地轉天翻而見而明珠回玉變是以人法雙泯非是兩空佛祖位中不存朕兆拄杖子任其拈放栗棘蓬從其吐吞山川草木同發一光通塞晦明絶無二見掀翻佛祖妙在一毫捏碎虛空無勞餘力不拘真諦俗諦總一切聲即廣長舌相豈論這邊那邊盡一切色是無見法身傷叢林秋季去聖時遙人人爭蝸角之利名懷鶻臭骨董不務真實鼓弄虛頭問口處多冊子上之鑽研舉念間盡情塵中之知見縱其攢花簇錦合四六以成文題實對虛聯四五而為句空持心所總失正因縱然覺發本明未免認賊為子似此之輩以當宗乘如來正法眼藏未有如今日者矣子數于方外歷遍諸老宿門庭正統甲子春到金臺次年二丑過西山隆恩遇箇老作家他以盡大地作爐鞴煉佛祖手拖拄杖直去掀翻如此一場方得大事了異自茲復返雲間安然靜處每于木人夜語石女朝歌不打諸方葛藤亦任鼾鼾自在山光溪色足己生涯月轉雲騰舊時公案和盤托出供養吾兄煩兄鑑諸煨灰幸也跋雪谷師所書普賢行願品跋子以佛眼觀我雪谷和尚從首至踵及彼盡虛空遍法界山河大地森羅萬像總華嚴一佛剎極微塵不可思議之法界也非空非色亦非內外中間有種種不可說佛剎世界而一切佛一切衆生未嘗與雪谷斯須相背且無彼此人法境界雪谷即一切佛謂之人空一切佛即雪谷謂之法空其或雪谷與佛念念現前心心無間謂之一切智智三昧也雪谷八萬四千毛孔皆具八萬四千光明之藏海化為八萬四千之寶幢一一幢各具八萬四千之香水海一一香水海各具八萬四千佛剎世界為八萬四千摩尼寶莊嚴佛剎世界謂之諸佛法界其諸佛法界皆以極微塵數而數之猶不可思議而為其說也是則雪谷之身心性情至于日用一切事一切為有無根塵幻化空色見聞知覺一一轉妙法輪一一語言文字俱謂華嚴佛剎一體一用與一切諸佛一切衆生體用平等而又一切諸佛一切衆生六根六塵六識一一根一一塵一一識與其人物境界一一交六根六分則皆我毗盧受用普賢行門所貴當處發明一一無礙一一現前轉物為己始知目前了無一法十方世界則是雪谷和尚無內無外亦無中間縱一念生滅昏沉散亂一一皆乘普賢行願毗盧華藏其一一莊嚴一一供養一一變現一一幻化妙用皆若太虛之之無量雲雨之無窮以此為智智三昧也蓋大方廣乃普賢三昧之行門佛華嚴乃毗盧一真之根本無生滅無去來絶語言絶文字一真實際無量無邊不可以智知識識忽然一念返本則知諸佛三昧正受內外如一生佛平等以根本行願隨處放光人事往來施為動止喫飯著衣經行坐臥聞聲見色觸境遇緣一一理事無礙無遺以及空空有有之異物物欲欲之殊猶鏡照鏡遍涉行門通行大智孜孜無為亦無住著無為而為無住而住應化隨機不拘善惡故華嚴謂一真之宗教佛所受用願行宛然悲智增廣語其動也波澄覺海語其靜也日麗萬方因結方成果圓諸品若帝珠寶網上下影聯誠德備行嚴遍周拈頌靈山有萬人天世尊拈花迦葉微笑世尊云吾正法眼藏涅盤妙心付囑迦葉無令斷絶師拈云釋迦老人臨行不得命根斷迦葉雖然發一笑大似落湯螃蟹尋常勘則得衲僧分上二俱當眨還有知他二老受貶的落處麼相識滿天下知心有幾人頌曰平地無端屈陷人鐵圍滿處弄精神愧他發笑機前禍妄指寒梅別問春維摩詰問文殊何等見菩薩入不二法門文殊曰如我意者無言無說離諸問答是入不二法門文殊問維摩詰我等各說仁者當說何等入不二法門維摩默然師拈云舌未動而已動機未萌而已萌賓主參差語言矛盾二俱弄巧成拙將謂大有不肯文殊見維摩眼目定動不然性命在甚麼處師拈拄杖云莫錯過麼頌曰夜深誰道黑漫漫無限松聲瀉月圓白雪陽春人和寡豈知潭底有龍蟜思禪師問六祖當何所務不落階級祖云汝從作什麼來思云聖諦亦不為祖云落甚階級思云聖諦尚不為落何階級祖云如是如是汝善護持師拈云桶底脫鉢盂跳衲僧家常茶飯雖然摩尼藏裏失卻摩尼生死海中且非生死祖師道如是護持不是好心山僧點破聖諦不為正是落階級處頌曰幾聲寒鴈度深秋落處明明知也不試問大蟲元是虎之之繞繞卒無休初祖西來神光乞安心祖云將心來與汝安光云覓心了不可得祖云為汝安心竟祖回光禮三拜祖云汝得吾髓師拈云一處不成兩處不就正眼勘來不出窠臼初祖似將軍出塞犯者不存神光不顧性命勇而無退所以萬古聲光不磨即今有向前的麼縱向前得臂不完全何故不入虎穴焉得虎子頌曰祖師只麼坐胡禪若說安心便不然九載臨行由付髓金剛眼底日沉煙石頭到思禪師思問從什麼處來頭云曹溪來思豎起拂子云曹溪還有這箇麼頭云非但曹溪西天亦無思云子莫到西天來麼頭云若到則有也思云未在更道頭云莫全靠某甲和尚也須道一半思云不辭向汝道恐後無人承當師拈云西天東土不出拄杖子拄杖子總在西天東土思問是則是頭答是未是莫全靠某甲要圓話頭處處溪山家家明月擊拄杖云還有承當處麼有何交涉頌曰秋中午夜有團團光極水輪水底穿若向明頭問明白煙籠霧罩滿長川武帝問達磨如何是聖諦第一義磨云廓然無聖帝云對朕者誰磨云不識帝不契磨渡江至少林帝問志公志公云陛下還識此人否帝云不識志公云觀音大士傳佛心印師拈云祖師見武帝猶夜夢人正夢花落鳥空飛武帝不契又不契箇什麼淆訛不少武帝只知漢語不識胡言所以不契也頌曰一曲村歌唱未關那堪雲雨過前山西天東土徒來往自是胡僧不會間臨濟將示滅囑三聖云吾遷化後不得滅正法眼藏聖云爭敢滅濟云有人問作麼對聖便喝濟云誰知正法眼藏向瞎驢滅卻師拈云手眼明白父子親授即不無要且不會正法眼藏舉拄杖云是臨濟不會三聖不會也不消得頌曰春山處處是花紅好鳥收聲蒼靄中陳爛葛藤千七百龍吟虎嘯奪全功雲巖初參藥山山問什麼處來巖云百丈來山云百丈有何言句巖云有時云一句子百味具足山云鹹即鹹味淡即淡味不鹹不淡即常味作麼生是百味具足底句巖無對山云爭奈目前生死何巖云目前無生死山云二十年在百丈俗氣不除又問海兄更說何法巖云有時道三句外省去六句外會取山云三千里外喜沒交涉山又問更說什麼法巖云有時上堂了大衆下堂次復召大衆大衆回首乃云是什麼山云何不早恁麼道巖于言下有省師拈云作家師範語默天然減一絲肉上剜瘡添一絲眼中著屑不如不添不減鬼家活計雲巖言下有省見箇什麼道理藥山總是按牛頭喫草雲巖亦且俗氣不除頌曰山花爛熳鳥聲聲丈六金身醉裏行更好多情岩上月寒光午夜觸人清夾山參船子船子問垂絲千尺意在深潭離鉤三寸子何不道山擬開口子便打山落水才出子又云道道山擬開口子又打山豁然大悟點頭三下子云竿頭絲線從君弄不犯清波意自殊山進問拋綸擲釣師意如何子云絲懸緑水浮定有無之意速道速道山云語帶玄而無路舌頭談而不談山云釣盡江波金鱗始得山乃掩耳子云如是如是師拈云折拄杖善能伏虎破砂盆惟得降龍輸他久歷江湖到底不虛聲價落水處心跳眼花點額時顢頇儱伺夾山雖然會去要且只得八成檢點將來全無巴鼻三番四次好不唧溜百拶千錐受用不盡古人與麼用意未審圖箇什麼還會麼千鈞之弩不為鼷鼠發機頌曰漁歌殘夕晚風流獲得金鱗暗點頭石女跨鸞襄水畔木人騎鶴上楊州藥山問高沙彌云我聞長安甚鬧彌云我國晏然山欣然曰子看經得請益得彌云不看經不請益山云大有人不看經不請益為什麼不得彌云不道不得自是不肯承當師拈云此事向明眼人前舉起面目無放處高沙彌道我國晏然藥山轉身依例回向縱是明眼人也索檢點若不檢點打失鼻孔頌曰幾人得到深微處碧嶂寒雲眼放眠海底天邊光燦爛珊瑚撐月正團圓雲蓋問石霜萬戶俱開即不問萬戶俱閉時如何霜云堂中事作麼生蓋無對經半年乃曰無人接得渠霜云道則大煞道只得八成蓋云和尚又如何霜云無人識得渠師拈云諸佛不出世祖師不西來這些子作麼生道縱是什迦達磨經三祗劫修來亦只嘴醭醭地若開口則禍事生也雲蓋經半年道得一句尚是八成若是十成縱是石霜未敢相許宗門確無一法繫綴古人一機一境借路經過豈許上人門戶頌曰象鼻岩高笑輥毬禾山打鼓絶風流不知禍事從天降識得渠兮接得渠肅宗皇帝問忠國師百年後所須何物師云與老僧作箇無縫塔帝云請塔樣國師良久曰陛下會麼帝云不會師云吾有法付弟子耽原請召問之師拈云國師膽大心粗不懼生死向尊貴位前大開爐韝星火燒天高舉鉗鎚電光掣地雖然末免墮在窠臼難以轉身帝云請師塔樣無理可伸召耽源露布不少頌曰聖智聰明振祖風國師被拶臉通紅耽源詔問依然錯白日瞞天打脫空僧問馬大師離四句絶百非請師直指某甲西來意大師云我今日勞倦不能為汝說問取智藏僧問藏藏云何不問和尚僧云和尚教來問藏云我今日頭痛不能為汝說問取海兄去僧問海海云我這裏卻不會僧舉似大師大師云藏頭白海頭黑師拈云佛祖出世你無星事他無星事你支吾他支吾要知他父子話頭落處麼拈拄杖云黑白分明勿勞擬議走殺衲僧所以如此頌曰金風撼樹葉頻飄萬壑千岩凋不凋卻笑竹梅松頂月依然常在伴禪曹藥山久不升座院主白云大衆久思示誨請和尚為衆說法山令打鍾衆方集山升座良久便下座歸方丈主隨後問云和尚適來許為衆說法云何不垂一言山云經有經師論有論師爭怪得老僧師拈云一不作二不休蒲團禪板鬧啾啾一不休二不作佛殿三門空落落經有經師論有論師爭怪得老僧是則是令人疑著藥山將此等茶飯搭在面前且不問你喫得喫不得座中有喫得的衲僧麼不知葛藤遍地頌曰五教三乘各有師無端平地溺千泥覺花梵苑雖寒落萬紫千紅獲一枝百丈上堂常有一老人聽法一日不去丈乃問何人老人云某甲于過去迦葉佛時曾住此山有學人問大修行人還落因果也無對他道不落因果墮野狐身五百生今請和尚代一轉語丈云不昧因果老人于言下大悟師拈云圓阤阤光爍爍活潑潑轉轆轆落也古殿寒蟾昧也天高地闊這一念子他因甚五百生作野狐身正好著眼學者往往將不昧謂其明也不知涅槃心易曉差別智難明頌曰脫落皮膚換卻毛到家方識主人高溈山便向牛書字任使叢林自貶褒雲門大師云光不透脫有兩般病一切處不明面前有物是一透得一切法隱隱地似有箇物相似亦是光不透脫又法身亦有兩般病得到法身為法執不忘己見猶存墮在法身邊是一直饒透得放過即不可仔細檢點將來有什麼氣息亦是病師拈云良騎追風兮夫子讀文大鵬搏雲兮魯班輪斧通身枷鎖太郎當劫外如今口打鼓大衆雲門要且不識法身膿滴滴血瀝瀝檢點將來幾合消得何故脫體潰爛向什麼處下手好淆訛爭怪得法身病在頌曰鳳凰池上幾番來雲霧彌漫一掃開悟道如麻還似粟與誰把手上高臺地藏問修山主甚處來修云南方來藏云南方近日佛法如何修云商量浩浩地藏云爭如我這裏種田博飯喫修云爭奈三界何藏云你喚什麼作三界師拈云村歌社舞馬大師不少鹽醬諸方只知飽食高眠敢保不會祖師意在且祖師意畢竟作麼生會三日一風五日一雨秋來稻上場歲歲要如此地藏與修山主道未審也曾端的來麼一人似喫飯未飽一人飲水著噎雖然二俱失利頌曰種田喫飯家常事就裏淆訛反妙玄默坐少林提正令一花五葉謾相傳廓侍者問德山從上諸聖向什麼處去也山云作麼作麼廓云敕點飛龍馬跛鱉出頭來山便休去來日山欲出廓過茶與山山撫廓一下廓云這老漢方始瞥地山又休去師拈云一處通千處萬處通一處會千處會萬處會無量無邊香水海三千大千華藏界德山老人嘴盧都大似腳根未點地雖然據我勘也是囫圇吞棗廓侍者不識用處已自百拶碎了諸方持諭謂之蝦跳不出斗頌曰一聲雷雨振前山萬象森羅盡轉顏不語語時真語語三賢十聖那能攀僧問趙州狗子有佛性也無州云有僧云既有為什麼卻撞入這箇皮袋州云為他知而故犯又有僧問狗子還有佛性也無州云無僧云一切衆生皆有佛性狗子為什麼卻無州云為伊有業識在師拈云左眼半斤右眼八兩千山萬山春色濃萬山千山秋氣爽趙州古佛落有無大似抓頭不是癢只如達磨面壁神光斷臂此豈不是狗子有佛性及乎返西天禮三拜汝得吾髓此豈不是狗子無佛性西來祖意無別說頌曰自家冷暖自家知涉水登山更是誰才子意高心膽大筆頭點墨振瑤池雪峰示衆云南山有一條鱉鼻蛇汝等諸人切須好看長慶云今日堂中大有人喪身失命僧舉似玄沙沙云須是稜兄始得雖然如是我即不與麼僧云和尚作麼生沙云用南山作麼雲門以拄杖攛向前作怕勢師拈云八面狂風五湖波浪飄飄落落兮也是不著便只如上不見諸佛下不見衆生長慶玄沙門被雪峰惑亂當下有得手的衲僧痛與掀翻一場慶快拈拄杖云照顧腳下頌曰一條拄杖從拈弄萬別千差總豁如松直鶴長根本事莫猶緘口坐茅廬風穴在郢州衙內上堂云祖師心印狀似鐵牛之機去即印住住即印破只如不去不住印即是不印即是有盧陂長老出問云某甲有鐵牛之機請師不搭印穴云慣釣鯨鯢沉巨浸卻嗟駐步輾泥沙陂佇思穴喝云長老何不進語陂擬議穴打一拂子云還記得話頭麼試舉看陂擬開口穴又打一拂子牧主云佛法與王法一般穴云見箇什麼牧云當斷不斷返招其亂穴便下座師拈云嫩筍細茶松風石枕也索是家裏人方知滋味風穴權衡太過不能決斷牧主饒舌俗氣未除凡謂鐵牛之機將示盧陂出陳當鋒可惜龍頭蛇尾大衆會麼彼彼此此囉囉哩哩疑出囚人口花開石碓嘴頌曰天賦靈機自陸沉當人錯過謾追尋窗前梅白枝枝玉砌下黃花朵朵金洛浦初參夾山山云雞棲鳳窠非其同類出去浦云自遠趨風乞師一接山云目前無闍黎此間無老僧浦便喝山云住住且莫草草匆匆須知雲月是同溪山各異截斷天下人舌頭即不無爭奈無舌人解語浦無語山便打師拈云柳緑花紅鶯啼鴈語有牛皮搖牛尾總不出這些子見解若向無巴鼻處摸著巴鼻虛空中擊碎虛空敢保夾山老人亦且望崖而退洛浦當時待他道且莫草草匆匆連加兩喝山亦未免手忙腳亂大衆洛浦當時一喝就死聽其取斷若不如此豈有今日頌曰釘樁搖櫓死登登帶水拖泥赤律藤不辨來鋒施一喝深巖古殿撲寒燈太陽明安察和尚問梁山如何是無相道場山指觀音此是吳處士畫陽擬進語山急索云這箇有相的陽言下有省禮拜歸位立山云何不道取一句子陽云道則不辭恐上紙墨山呵呵云此上石去在後果上碑師拈云塵說剎說微細說橫說豎說一切說與麼說總不如隨例度日且明安言下有省禮拜歸位這些子恰似高高峰頂立深深海底行梁山知伊安手腳處不覺失笑美則美矣爭奈死馬作活馬醫頌曰路窮機喪果無疑撒手懸崖別是奇透出目前聲色境始知下落舊支離雪峰在洞山會下作典座淘米次山問云淘米去沙淘沙去米峰云沙米一時去山云大衆喫箇什麼峰乃覆卻盆山云得即得須別見人始得後果嗣德山師拈云佛法無你造作安排處要首尾見得透徹不然情生智隔且雪峰與道麼畢竟是會洞山意不會洞山意洞山不妨作家也不分訴只道箇別見人只此便見得雪峰被洞山徹頭徹尾勘破也後果嗣德山可謂珊瑚枕上兩行淚半是思君半恨君頌曰覆卻盆兮話未休那堪頭上又安頭果然不是他家客閬苑騎驢又別游洞山到北巖禪師處巖問甚處來山云湖南來巖云觀察使姓什麼山云不得姓巖云名什麼山云不得名巖云還有事理也無山云自有即幕在巖云還出入否山云不出入巖云豈不出入山拂袖出去巖來日侵早入堂召洞山山近前巖云昨日祗對上座話不稱老僧意一夜不安今請上座別下一轉語若愜老僧意便開粥相伴過夏山云卻請和尚問巖云不出入事如何山云太尊貴生巖乃開粥同過夏師拈云語言文字見聞知覺用則一切總用不用則一切總不用所以我為法王于法自在與麼有一法即得無一法即得有無無有總然即得大衆北巖鼓粥飯氣昨日公案八字不成今日眼睛洞山有眚是則許他爭奈死水不藏龍衲僧家到與麼田地切不可坐成大病須是興波作浪攫霧拏雲始得頌曰窠臼彌天何太微霏霏拂拂又依稀金輪王子然尊貴出入誰知犯禁闈雲巖道吾自南泉回藥山巖問藥山如何是異類中行山云吾今日困倦且待別時來巖云某甲特為此事來山云且去巖便出道吾在方丈外聞雲巖不薦不覺咬得指頭血出吾卻下來問巖兄和尚那因緣作麼生巖云不為某甲說吾便低頭師拈云喝佛罵祖鍛聖鎔凡卻不是你胡笳曲調趙璧燕金珠回玉轉要且向孤峰頂上大洋海底坐臥經行出入自在不然藥山道今日困倦待別時來此等之談使人忘家失業這箇死漢已被埋卻只如道吾咬指出血正謂東家人死西家助哀即今還有當機得活的漢麼有則不負古人拈拄杖云大衆看頌曰機前用外任于于孰不隨言被遣拘未合作家垂手處一隅難以返三隅夾山上堂云明不越戶穴不棲巢目不顧他位腳不踏他位裏六戶不掩四衢無蹤學不停午意不立玄千劫眼不惜舌頭底萬劫舌頭不顧眼中明峻機不假鋒芒事到這裏有箇甚麼事闍黎竿頭絲線從君弄不犯清波意自殊師拈云打虎之機拏雲之手八面威風十方坐斷大悲千臂趨向無門摩醯三眸顧鑑無所只須向佛祖行不到處薦得方始不受羈絆要坐便坐要行便行且謂夾山上堂無端傾出這一落索葛藤遍地端的勘來未免有損有益有利有害殊不知將軍氣宇憑王劍縱坐清平肯陸沉頌曰靜如止水動行雲千聖從茲耳不聞月落窗前終夜事誰云夏至與秋分僧問夾山撥塵見佛時如何山云只須揮劍若不揮劍漁父棲巢后僧問石霜撥塵見佛時如何霜云渠無國土何處逢渠僧后舉似夾山山乃上堂舉了云門庭施設不如老僧入理深談猶較石霜百步師拈云兵隨印轉將逐符行耀古洞今珠輝玉振金剛玉劍孰敢當鋒摩尼寶輪誰能酬價只此當機不當機還他言言說到見諦非見諦須是步步行來且如石霜與麼酬唱夾山與麼披離果然較百步不較百步據山僧見爭之不足讓之有餘諸方試檢點看頌曰踏遍千山與萬山轉身須是腳頭間眼空四海無人識野鶴孤雲任往還漸源興禪師一日持鍬上石霜法堂東顧西顧霜見乃云作麼源云覓先師靈骨霜云洪波浩渺白浪滔天覓什麼先師靈骨源云正好著力霜云一物也無著什麼力源持鍬便行太原孚云先師靈骨猶在師拈云工夫不到句不方圓語默不同終非眷屬所以一切法不礙一切事物物上明頭頭上顯此箇道理一動一靜見得明白不妨終日言而未嘗言自然明暗相通遐邇一至漸源石霜一人似平地骨堆一人似因風吹火孚上座云先師靈骨猶在畢竟在甚麼處只是草莽無人頌曰舍利靈根非好事何須東去復西來還他獅子兒獅子百獸群中顯大才洞山價禪師解夏上堂云秋初夏末兄弟或東或西直須向萬里無寸草處去良久云袛如萬里無寸草處又作麼生顧視左右云欲知此事直須枯木上生花始與他合石霜云出門便是草後明安云不出門亦是草漫漫地師拈云從上佛祖有甚麼大奇特處他只是箇了事凡夫尋常行履如紅爐點雪到與麼田地語言機境自然合轍卻不是計較思惟中出摩尼珠如意寶要用信手拈來皆是精金美玉如今學者不究此等之妙知知覺覺上著道且價禪師與石霜道則且置明安謂不出門亦是草漫漫地這裏大好著些精彩不可放過頌曰大地山河無寸土腳頭不動草漫漫動於未動較些子萬國千邦總一般僧問洞山尋常令學人行鳥道如何是鳥道山云不逢一人僧云如何行山云直須足下無私去僧云袛如鳥道莫便是本來面目山云闍黎為什麼卻顛倒僧云什麼是學人顛倒山云若不顛倒為什麼卻認奴作郎僧云如何是本來面目山云不行鳥道師拈云向上一路千聖不傳擬議之間一失永失所以千聖不傳之妙即諸佛莫盡之玄一言之下心地開通一軸之中義天朗耀學者果能向語言知見上勘得破無泥滯深造奧室一一無二無三卻與三大阿僧祗所悟更無兩樣其或不然三乘五教皆是障道之因緣障自心地學者聞說切忌認奴作郎且洞山與麼不放一絲之罅未審明甚麼邊事頌曰豎拂拈鎚賞俊英一機一境立權衡魚行鳥道無人處垂柳陰陰暗轉鶯蛤溪道者相看洛浦浦問云自從梨溪相別今得幾載溪云和尚猶記得昔時事浦云見說道者總忘卻年月也溪云和尚住持事繁且容仔細看浦云打即打會禪漢溪云也不消得浦云道者住山事繁師拈云作家手眼決不尋常語脈貫通天然自在爾恁麼道我不恁麼道爾不恁麼道我卻恁麼道雖不恁麼卻恁麼的恰好蛤溪洛浦語言返復酬酢賓主上勘來主中有賓賓中有主賓主歷然只如主中主一著二老未夢見在此事且置畢竟是住持事繁邪住山事繁邪具眼禪和試徵別勘頌曰天翻地轉兩相酬倒嶽傾浪遍地流剔起眉毛開豁眼毗盧頂上輥花毬黃山輪參夾山山問甚麼處來輪云閩中來山云還識老僧麼輪云和尚還識學人麼山云不然子且還老僧草鞋錢了然後老僧還則不識和尚未審廬陵米作麼生價山云真獅子兒善能哮吼師拈云機輪轉處彼此相吞正令當頭死活未放珠走盤盤走珠劫外風光目前茶飯井覷驢驢覷井不妨箭中紅心要且君臣道合父子相投真獅子兒善能哮吼雖然爭奈只具一隻眼再拈拄杖云觸之則瞎背之則喪不觸不背夾山與黃牛畢竟向甚麼處相見頌曰千里同風不異求夜深明月轉高樓弄潮無限人誇賞幾箇當場得出頭九峰虔在石霜作侍者石霜遷化衆欲請堂中第一座接續峰不肯乃云待某甲問過若會先師意某甲當如先師侍奉遂問首座云先師道休去歇去一念萬年去寒灰死火去古廟香爐去一條白練去且道明什麼邊事座云明一色邊事峰云恁麼則未會先師意座云你不肯我邪裝香來座乃焚香云我若不會先師意香煙起處脫去不得言訖便坐脫峰乃撫其背云坐脫立亡則不無先師意未會在師拈云眼橫鼻直頂圓足方耳朵連腮兩片頑皮嘴唇搭舌一張臭口通身儱侗脫體顢頇有時南嶽天台有時西乾竺國三更日午來去自由什迦達磨綽然不識這裏還有識得的麼只如九峰道首座坐脫立亡則不無先師意未會在大衆九峰與麼不肯首座果有什麼意在若無則生陷首座若有則埋沒石霜檢點將來九峰合貶且石霜道此六箇去字畢竟明什麼邊事大衆若是老僧再加幾箇去字不妨若是學者一箇也多了頌曰紅爐燒雪焰飛空首座言明一色功坐脫立亡何處去石霜花放鳥聲通湧泉欣禪師騎牛于路值強德二上座強云蹄角甚分明爭奈騎者不鑑泉拍牛避路二上座至樹下憩息煎茶泉出乃問二上座近離甚處強云那邊泉云那邊事作麼生強提起茶盞子泉云此箇猶是這邊事那邊事作麼生強無語泉云莫道騎牛不鑑師拈云日上曉山色青金鎚擊碎玉崑崙花影濃鳥聲切三乘五教無邊說七尺烏藤顛倒用拈來打破維摩默看來此事如馬前相撲如石火如電光豈許立機境作知解擬議之間喪身失命強上座好箇問頭自家不曾通變有頭無尾泉亦老婆心切轉身回位向他道莫道騎牛者不鑑雖然總不如拍牛處最妙頌曰一拍牛兮未較遲真機言外有誰知癡人說夢知無限卻是將拳嚇小兒鳳翔石柱禪師到洞山山垂語云有四種人一人說過佛祖一步行不得一人行過佛祖一句說不得一人說得行得一人說不得行不得那箇是其人柱出衆云一人說過佛祖一步行不得者祗是無舌不許行一人行過佛祖一句說不得者祗是無足不許說一人說得行得袛是函蓋相稱一人說不得行不得者斷命求活如石女兒披枷帶鎖洞山云闍黎分上又作麼生柱云皆通分上卓卓寧彰洞山云袛如海上秀士又作麼生柱云幻人相逢撫掌呵呵師拈云一代時教詮注不著一機之境意自無窮火熱水冷風清月白唯許道人受用會則已過新羅未會途中生受石柱洞山一唱一和按拍相應中間空隙難為具眼二老有許多說話畢竟在那一句是他空隙處衲僧家到這裏若放過行腳事黑漫漫地試具眼勘頌曰四種人將立問端中間勘破不為難長安最是風花境幾箇歸家酒不闡雲居膺禪師上堂云得者不輕微明者不賤用識者不咨嗟解者不厭惡從天降下則貧寒從地湧出則富貴門裏出身易身裏出門難動則埋身千丈不動則當處生苗一言迥脫獨拔當時言語不要多多則無用處師拈云萬機俱罷一句當天一語相函諸方易識宗通說通說至宗至除他大死蘇來自然貼體全妙佛法不落語言文字不執知覺見聞不減喫飯著衣不拘施為動靜且如雲居上堂發多種之語誨人是他知有衲僧本分事衲僧家直須眼底空空胸間落落許爾逢場作戲竿木隨身柳巷花街挨排任運門裏出身則且置身裏出門畢竟如何雲居也只說得其後恐具眼人檢點急急收拾卻謂語多無用以此看來實未夢在諸方還有檢點的麼㘞老僧也未夢在頌曰山花簇簇錦重重日暖風和春正濃身裏出門門裏出灰頭土面髮髼鬆青林虔禪師僧問學人徑往時如何林云死蛇當大路勸子莫當頭僧云當頭者如何林云亦無回避處僧云正當恁麼時如何林云失卻也僧云未審向什麼處去林云草深無覓處僧云和尚也須隄防始得林撫掌云一等是箇毒氣師拈云雙明雙鑑雙用雙行物物全彰頭頭顯露真機獨脫異類中行語默全超不存矩則這僧謂和尚也須隄防始得林撫掌云一等是個毒氣且道這僧毒邪青林毒邪又畢竟喚什麼作毒在三乘十二分教謂之語言文字經論毒在達磨西來不立文字謂之直指成佛毒在衲僧分上謂之絶佛絶祖毒其如不與麼謂學者別道看師亦撫掌云莫與麼毒好頌曰頭頭物物總融通任運施為妙不功春暮花闌時已去子規哭在野田中曹山寂禪師僧問五位對賓時如何山云汝今問那箇位僧云某甲從偏位中來請師正位中接山云不接僧云為什麼不接山云恐落偏位中去復問僧祗如不接是對賓不是對賓僧云早是對賓了也山云如是如是師拈云衲僧用處如石火電光萬仞崖頭放身捨命聞底見底如栗棘蓬吞來底去底似金剛圈透豈可癡呆落魄雖終日飯未嘗咬一粒米終日眠未嘗睡一隻眼賓主互換偏正不拘至位融和所謂無礙山不接意當面埋沒這僧惑亂雖然忘失家業如是如是豈是好心座上還有知得的衲僧麼頌曰太多漏逗老曹山正去偏中孰敢攀雲鎖殿沉燈影寂夜深月下有僧還白水仁禪師上堂云老僧尋常不欲向聲前句後鼓弄人家男女何故聲且不是聲色且不是色時有僧問如何是聲不是聲水云喚作色得麼僧云如何是色不是色水云喚作聲得麼水復云且道對闍黎話為闍黎說若向這裏會得許你有箇入路師拈云青山白雲鳥噪猿啼衲僧摩摩娑娑拄杖烏烏律律隨身必用觸物洞明善能入理深談那容絲毫間礙白水與麼道似與聲色之有遺害所以云喚聲得麼不然白水莫別有長處可謂菩提涅槃真如般若盡是外邊事不涉機境絶知見離意識卻較些子還會麼色聲轉身易身轉聲色難頌曰青天白日啓柴門野鹿山猿任往屯聲色兩頭俱坐斷嵐光拂拂雨渾渾臨濟和尚示衆云有一無位真人常在汝等面門出入初心未證據者看看時有僧出問如何是無位真人濟下禪床扭住僧擬議濟托開云無位真人是甚麼乾屎撅師拈云迷悟親疏聖凡差別一得永得一了百了承當得去人間天上任意消遙虎穴魔宮隨情放曠拈拄杖云此是無位真人非無位真人且如濟下禪床費許多心力道無位真人是甚麼乾屎橛殺活體用一時發露大衆這裏釋迦老子四十九年橫說豎說一切說總說不著若要明白試勘上文頌曰盡力提持謾自誇當機猶自眼周遮一言發出傾心膽幾箇男兒親到家洛浦臨終示衆云今有一事問你諸人這箇若是頭上安頭若道不是即斬頭覓活時首座云青山常舉足日下不挑燈浦云是甚麼時節作這箇說話有彥從上座出云去此二途請師不問浦云未在更道從云某甲道不盡浦云不管你道盡道不盡從云某甲無侍者祗對和尚浦便休至晚喚從上座問你今日祗對甚有來由合體得先師意先師道目前無法意在目前他不是目前法非耳目所到且道那句是賓那句是主若檢點得出付鉢袋子從云不會云汝何不會從云實不會浦喝出云苦哉苦哉僧問和尚尊意若何浦云慈舟不棹清波上劍峽徒勞放木鵝師拈云殺人刀活人劍死者死活者活風落落水潺潺雲片片日杲杲到底是他威令重倚天長劍逼人寒言前句後獨脫縱橫這畔那邊勿勞擬議與麼則鉢袋子也不消得賓主主賓有甚交涉且如洛浦臨終示衆除言語心意識外畢竟為甚麼邊事再三再四可憐撲碎珊瑚枕夢破教人離恨多頌曰善哉鉢袋無交付亙古今兮恨怨深一曲陽春傷已盡再求誰是我知音南陽忠國師僧問如何是本身盧舍那國師云與我過淨瓶來僧將淨瓶到國師云卻安舊處著僧復問如何是本身盧舍那國師云古佛過去久矣師拈云光明寂照處處逢渠事出尋常頭頭撞著冰河發焰不拘死火寒灰枯木間花那論春前秋後羅龍之句切切親親陷虎之機來來往往老國師亦自退身有分進步無門大衆這僧若是作家將淨瓶向國師擊碎國師只得懡㦬且道國師果然會這僧問不會這僧問據正眼勘國師也只知量邊事要且不識這僧問頭師云國師在這裏本身在甚麼處頌曰擒來縱去展干戈無奈身中盧舍那妙手神通徒攪攘龜毛鎖住月婆娑大隨和尚僧問劫火洞然大千俱壞未審這箇壞不壞隨云壞僧云恁麼則隨他去也隨云隨他去僧問龍濟劫火洞然大千俱壞未審這箇壞不壞濟云不壞僧云為甚麼不壞濟云為同大千師拈云一句了然通身明白那得東倚西靠任是你南我北一一合轍不廢工夫爍迦羅心金剛正眼無處不遍無處不明且如大隨龍濟答這僧問處語言雖異緇素相同見處分明翻為不是壞也隨他去不壞同大千灼然古佛放光明爭奈當機多錯過頌曰大千壞盡劫火然壞不壞兮太可憐試問諸方參學者話頭早晚得方圓仰山問僧甚處人僧云幽州人山云汝還思彼中麼僧云常思山云能思是心所思是境彼中山河大地樓臺殿閣人畜等類反思思底心還有許多麼僧云某甲到這裏總不見有山云信位即是人位未是僧云和尚莫別有指示否山云別有別無即不中據汝是處只得一半得坐披衣向后自看師拈云啖啄莫入密不通氣耀古耀今鑑天鑑地明明百草頭明明祖師意山前雲片片澗下水洽洽花放鳥銜來果熟猿摘去舊時公案一一現成不隔絲毫且仰山道反思思底心還有許多麼這裏正是陷坑埋沒太甚將正眼看漏逗不少大衆仰山變砒霜鴆毒為甘露法幢只是無人服得何故服之疾死頌曰禾山打鼓雪峰毬不風流處總風流誰謂祖師心印別花開紅白艷春不三聖問雪峰透網金鱗未審以何為食峰云待汝出網來向汝道聖云一千七百人善知識話頭也不識峰云老僧任持事繁師拈云大藏小藏全提半提一切祖意一切教意一切語言一切聲色瓦解水消既是與麼且雪峰三聖知此事麼不知此事麼若知爭解與麼道不知又爭解與麼道一人大似錦上簇花一人還似花間簇錦是則也是話頭未圓大衆畢竟什麼處是他二老未圓話頭處洪波浩渺宇宙荒茫打破虛空方與你說頌曰相談不必問如何透網金鱗駕碧波二老鋒戈平地展果然頭角與天摩中際能禪師示衆云萬古長空一朝風月不可一朝風月昧卻萬古長空不可以萬古長空不明一朝風月且道如何是一朝風月人皆苦炎熱我愛夏日長熏風自南來殿角生微涼會與不會切忌承當師拈云露柱燈籠三門佛殿終日轉大法輪鉢盂拄杖蒲團禪板終日聚頭寂聽且道露柱燈籠三門佛殿畢竟說箇什麼鉢盂拄杖蒲團禪板畢竟向甚麼處聽諸方禪德向這裏若有箇入處則長空風月萬古一朝明則任他明昧則任他昧與麼則佛句祖句賓句主句總與麼阿轆轆地更有什麼如之若何大衆中際不免打失鼻孔山僧亦且舌頭拖地頌曰佛法那容間理論一機一境透無門金剛玉劍從揮劃佛祖相親逼膽魂
