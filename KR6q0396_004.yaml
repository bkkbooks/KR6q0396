body:
  text: 偈贊先師無際和尚道感文并偈我東普無際老師乃古佛之應示也不捨悲願向二千年外大弘如來之正法眼藏凡一語一默一機一用不著于文字生滅不思議海深而無底縱十方諸佛諸祖莫測其端況二乘知見了師之秘藏乎蓋師之道通播十方已四十餘年天上人間咸炙其光獲益無量洪惟大明聖帝宗嚮師道詔入闕下加賜恩寵僧俗叩室請益旦夕相繼不絕師示以慈悲無畏之相將所證心旨咸為普說如天一雨山川艸木各得其潤化道既畢忽日告眾遺誡說偈端坐而逝時白毫貫天聖燈夜燭皇上遣官造龕諭享今嗣法徒善堅謹以師實行普示人天布于無窮讚曰我師大威德弘道于末運一語一默中具含無量義大不思議海心珠曜十方內外中不著寂滅證圓通一切諸國土塵剎妙宣揚四海悉動搖天地俱旋轉微塵諸佛相光體普圓通無去亦無來湛來體圓妙一言一切法超世諸文字了然心境明猶處虛空座說法如雲雨機用若電雷乾坤悉震動邪魔碎微塵密中言莫及句外難度量大千諸世界攝入一毫頭普放大光明照徹諸佛國不可思議力照大總持門如月明眾象實非二光體似日輝大地能悅眾生心說法法無說法說非非法句義妙難思洞超諸佛祖所演一切法字字放光明所說一切偈言言總玄妙不著諸眾相不捨世間心成就大菩提道明于今古妙相無空色應物現真形紫磨光充滿不可盡稱讚惟我大導師真實具斯事妙讚不虛說最上仁師子光體若虛空不礙諸佛相光體恒不動不捨諸國土巍巍現本尊大全師子力我今稽首禮稱讚真實相唯願諸人天受持轉流布世出于世間決定不退轉無上大導師古佛應于世光明照十方蒙光得解脫世有種種言莫能讚師行而我授師記故已徹為讚師忽寂滅定白毫光充滿夜每聖燈現驚動諸人天感佛之大化不捨師滅度亦不捨涅槃師既逝去已法身相常住非去實非來凝然光寂滅惟子知此事所演偈讚歎普告諸人天知師諸實行古拙老祖真讚拗折雲門之棒機如掣電用若流星勘破趙州之無理出尋常詞汪巨海入白雲老翁之室謂有倒座之謀示古拙拔萃之容且無教子之道通身手眼家破人亡遍地戈矛塗窮計盡其生也黃花翠竹其死也青嶂白雲謂如此兮花攢攢錦簇簇非如此兮日杲杲月團團總不如此兮萬紫千紅茶坊酒肆咄還會麼諸方要與祖翁相見請看有後句禪板橫拈道路窮更無伎倆與人通老翁家國無雄特不必當機問券功釋迦佛出山相贊三十二相相何相八十種好好何好到此依然跳不出未見通身入荒艸入荒艸兮雲渺渺海角天涯無處討未後拈花笑飲光狼籍一場自放倒大悲菩薩相機力盡時消息盡波原是水水原波大悲心智難描貌說與傍觀事不多多不多四智三身總落魔道人向此知端的勿勞三四問如何萬與一法空畢千眼分明親的的一片白雲橫太虛任東任西任南任北卷舒出入魚籃相短柳依依水石間攜籃來去幾曾閑相思一點情無看不遇佳人空自還達磨諸方還知這老子有褒貶處麼老僧貶伊與我不同國不同家不同生不同死卻又褒伊斷神光臂未後付與皮付與肉付與骨付與髓蒼天蒼天恩大難酬所以如此善財南游圖剎剎塵塵煙水洲幾經寒暑去參求惑他五十三人鬧直至而今鬧未休羅漢寒山枯坐待春來一片迷雲撥不開頑鐵鑄成生面孔煙塵灰土任空埋歌了一歌君不見若了一萬事畢誰向一中能了的便了的且何益笑我頭阤全不識說與君莫教昧逆順縱橫我無二那勞再四與再三舉起依然猶錯會從茲了得無箇疑聊向歌中一一推三不多一不少百千三昧徒之繞倒指數來難斷頭何如放下一時了了不了不了了堪笑毘耶老古錐文殊一拶通身倒良久去如何會淆訛千七總成累其中妄想與無明喝佛罵祖當游戲不說知音天下無地老天荒誰管轡了一歌意何說沒絃琴弄諸音絕鐵牛昨夜上崑崙觸著虛空眼滴血只得乾坤闇點頭無端大地都傾泄一非一了何了修多羅教落荒艸如來禪與祖師禪天上人間誠不少飲光一笑至如今祖祖相承都未了了了了一一一二五原來是一十不須擬議半毫分棘目曲兮松自直選佛場會及第天下叢林少相繼翻復復翻仔細看豎起脊梁眼觀鼻呵呵呵誠可惜佛祖都來言不及老婆心切為誰家聻聻聻兮太真實皮袋歌君不見這皮袋無量劫來捏虛怪自家心地不回光剛與無明輥作塊或憎愛或是非些兒不順便蹺蹊一點光明被遮覆都線只是這張皮日用處惟恣自妄想貪癡略無忌思量皮袋子昏花出入皆緣不潔處肉一團骨一聚施為粧點成何計百年眼見不爭多座中且勿爭閑氣這皮袋休止住百骸會合假安寄一息不來萬事休換面改頭隨業去貪皮袋真箇呆摩尼珠寶被他埋欲愛昏盲無厭足敗壞場中去復來幾回生幾回死位至諸侯也如此若能勘破自知之了心直搆如來地皮袋子聽我教共你商量你莫拗尋師擇友去參玄見性明心真可道一缽食一毳被塞耳藏頭惺惺地脊梁豎起眼睛開一切有無盡拋棄皮袋子莫懶墯寒暑無拘只麼坐年深月久自然成驀把虛空忽拶破到斯時方瞥地喝佛罵祖當游戲皮袋果能信我言三藏多羅成唾涕苟或悟豈徒然妙用縱橫在己邊柳綠花紅皆可可不方圓處總方圓皮袋子多寶藏四十九年成虛誑一千七百外邊談佛與眾生皆等量真樂歌君不見我之樂非庸樂無憂無慮無拘縛去住都緣只一身且無情愛與爭奪不求心不滯教放蕩疏狂亡覺照生生死死實堪悲辱辱榮榮真可笑死生榮辱本無關自是迷夫心妄造不恣非不強是此即山翁真樂處會得猶癡物外閑未會忙然心暗昧坐兮坐臥兮臥且無佛法苦擔荷飛來海月共山雲愛我閑中時復過春之夏秋之冬年來年去總相同住久巖阿無可見陰晴榮落幾番空知世事皆類此安保升沉不到己笑吾野散在深幽土面灰頭而已矣不趨貴不干榮榮貴知如水上萍智者忘懷順天命庸愚強向背其中不悟心焉知止諂詐矜狂太乖理縱能會盡古今文未出興亡何足齒野頭陀性剛硬一切妍媸情不紊縱令好事塞天來于我樂中皆沒分說此樂且非惑試問當機只一摑就中有顆摩尼珠曲示兒孫苦拋擲誰拋擲晝夜光暉能映奪若然解契此摩尼曠劫苦輪當下脫欲悟我且休人人我休休樂水雲與君說箇真消息生處熟兮熟處生我真樂處將易樂縱悟歸來且還錯三賢十聖尚難容知解輕浮安著腳傍石巖依澗水卓箇尖頭屋藏己絕他人事與沉浮但把自家心地死不妄作何有為地爐撥火共相偎饑時爛煮和根菜飽後沿溪去復回我兮樂樂兮我我樂樂兮我樂我樂我我兮我亦無我樂無兮真懡㦬我無我樂何樂為驚吾門諸玄學趁今年少好休心來伴老夫把頭縮詩七言絕句題牧牛圖併引夫謂牧牛者譬人性之狂掉也覺乃佛祖之真源逸則輪迴之妄性靈光則一迷悟從殊迷之遂業緣心悟也惟心無業謂此心非雜染造作之心乃無為無垢之真心也良由眾生不覺憎愛無明顛倒昏迷自心自障故且以牛喻說指月明心欲人人棄妄歸真舍迷達本達斯本源即如如佛蓋人之妄造猶牛鼻未穿頑劣生獰猖狂自恣生死臨頭決無下落忽然惺悟放下通身仔細追窮如牧童討蹤尋跡一旦逢渠于古路驀鼻牽回痛下無情毒手時時馴制左右莫違收放隨人頭頭管顧功施已久劣轉淳回出入荊棘分明無閡到此牛忌頓寂齁齁蘚石濃眠豁然天地平沉人法雙泯這裏則廓廓玄玄虛虛碧碧一道神光無邊無際轉身獨步返本澄源撒手空空功不浪矣淫坊酒肆醉臥橫行挨身于古廟之中作笑于花樓之上天上天下出入崢嶸世出世間往來任運阿呵呵倒騎千聖唱哩囉心佛物兮渾未是石人橫跨海門歌到這裏更有一著大不思議事佛祖從來猶未夢在且道是箇甚麼唵悉唎悉唎蘇嚕蘇嚕入山尋牛曠劫相拋今欲尋山雲迥漠雨泥深唯聞群鳥聲花裏未見猙獰遞一吟荒谿見跡月瀰宇宙亂峰多幸有行蹤豈恁麼帶雨和煙迢遞去不辭勞苦必擒他見牛必獲窄徑相持作一聲㟪巖鼓動出雲青雖然狂性遊郊久頭角新新總十成得牛馴制拼命懸崖獲得渠未加鞭策性安除鼻頭拽轉勤調御再不容伊出舊居牧牛受策牧牛已熟漸隨身覺盡偷心始脫塵簑笠鞭繩俱頓脫相將左右逐羈人騎牛歸家獨跨獰牛返故家橫吹鐵笛見煙霞歸來豈住中途地直待乾坤伸爪牙忘牛存人牛彎蘿月曜崇山牛既忘兮我獨閒谿外淡雲涵碧嶂寥寥清寂夢濃間人牛俱忘人也空兮法也空絕無名相可窮通明明佛祖非基位豈有毫釐繼此宗返本澄源無欠無餘熟用功谿山側聽若為聾盈眸聲色全彰體月白風清日轉紅入廛垂手破衣垢面入廛來腦後分明別有腮野老家風渾氣象廓天門戶大掀開囑悟心禪客勉子歸山去莫遲祖庭繼囑合如斯冷冰冰處隨宜用塞耳藏頭更待時宗門揀要楞嚴經云汝元不知一切浮沉諸幻化相當處發生隨處滅盡宗鏡錄云先以聞解信入後以無恩契同若入信門便登祖位山雲水石云生滅之法不出心念無生滅法即心念不出所以佛祖語言皆的的要旨但能信受總持不忘則參學事畢保重勿贅其一論教談禪兩太迷凡情聖解使人疑通身有口誠難說落葉西風滿地吹其二欲叩吾宗壁觀禪卻無長短與方圓工夫做到忘機處始信心光總一然道人山居構屋山居物外禪繞白石與清泉年來識破安心法衲被蒙頭自在眠尋隱者為訪山人入路偏山中風景自悠然到門得見雲松主相對無言即是禪贈明道禪者禪機盡載語言中老我無言佛法空說似同袍明道者曾無一字與人通為海嶼菴書山藏海嶼海藏山利祿榮華苦莫攀欲問出群高一著請將心鏡照衰顏為清道人書閑寂軒四簷空碧道人家一段風光不市華靜坐蒲團無箇事殘暉倒影入窗紗送禪者隱山古人口醭衣鶉縷直入千巖萬巖底子下冰寒鐵石心敢教佛祖無依倚為老宿山隱翛翛茅屋倚巉巖白晝閑雲為掩關自是年來心地死蒙衾終日到三竿無客軒為獨翁題柴爐煨老平生友打戶無人到此間莫謂晚來蕭索甚清風明月伴幽閑為清滿智淨德五禪客乞禪到大忘人法處案山頭點欲伸言因君記得當年事月到中天哭夜猿其二禪到語言文字外洞然不載祖師機禪公今日攜囊去秋雨人家半掩扉其三禪到無心無亦無時清才子孰歸湖唐言梵語泥今古縱得全提滯半途其四禪到無參始寂寥秋空孤月照岧此行策杖江南去待看來年三月潮其五禪到歸源絕悟迷機前句外落尋思老胡弄巧翻成拙隻履西歸腳帶泥擬古德十可行十首寥寥忘睡亦忘炊靜坐怡然亦不知未等痴禪空守默至今佛祖絕狐疑入室不著語言文字外當機滯句早相欺鋒芒未敵猶傷犯擬欲生心亦是迷普示此事叢林古鑑模大家齊力去相扶作麤擔重加精銳肯作人前大丈夫粥飯缽盂收轉尋常事飯後東行又到西試問滿堂諸上座和南誰不把頭低洗衣破衲和煙幾片絲半零半落浸寒漪今朝天氣初晴爽掛在當風日景遲掃地時時掃去時時有未審有時何處來索性一番連地捲眼空方不惹塵埃諷經一軸伽陀記未悶日來月去幾時休見童聚首空王殿鬥到如今盡白頭禮拜釋迦相體黃金色一種風流意氣深禮拜起來珍重立相逢漫道我無心話道夜爐茶話共同參幾箇開懷最上談一句合題超古德石屏分月浸寒潭四照用眼上眉毛眉下眼從生至死未嘗移江湖大有通方士出得泥團是幾時四賓主有禪可悟心猶易無法應難起念危縱奪當機誰自任水雲相向謾支離四喝語舉起一番新一番驢鳴犬吠寄同參若將此事為容易豈免傷鋒犯短長三玄要春妍萬卉發新條葉緣花紅境富饒歲歲東君神不減當陽何必叩參寮示客問念佛參禪之意參禪擬欲狂心歇念佛狂心欲擬空若向一頭安腳穩百千門路自然通金臺書示學禪人選佛當年絕有談聖凡情解盡掀翻五車三藏從君背啐啄機前下口難僧老獨居半問禪室誰同老影子相依兩箇僧八萬四千毛孔裏石窗深鎖月為燈示眾粥去飯來休理論生兮死也只如斯老夫到此難批判說與闍黎只自知侍者擊鼓參鐘向上鉗槌一擊中機輪活脫露全功禪門舉手焉輕放要使乾坤徹底空從生放下休嘴盧都處安心坐滿口道來一字無除此再非透珊瑚枝上月輪孤坐中聞猿啼宗門太段太風流滾滾江湖說未休半夜猿啼巖上月光明彌滿四神洲春吟曉處尋春不放一朝閑踏遍千山與萬山好是晚來詩就處銀鉤照眼欲彎彎禪蒲二首撥地火灰煨萃食編蒲葉褥放身眠山翁只解與麼說有口何曾會說禪其二沒面孔人沒可把足無卓錐頭無瓦三賢十聖猶喑啞是佛是祖遭唾罵夏日與友登山夏日登山與友遊笑談不覺到層樓相攜更上顛崖望無限浮雲在腳頭送僧歸蜀故鄉日暮聽啼鵑歸到家山三月天送子松門分首處野雲寥落滿山川侍者別我二冬侍我在爐頭榾柮頻燒費茗甌正好看梅辭我去明年此日再來不雲林精舍黃金未博幽人趣白玉難移道者心試問腰金衣紫客可能消得此雲林述懷萬峰深處更深處土面灰頭一野僧規矩全無多懶慢未嘗開口得人憎請道者隱居坐臥經行三昧定死生老病一團神庵中道者無他聽惟有泉聲清耳邊答張文勝不落前思又後思此時活計許誰知宗門棒喝如雲雨豈肯將拳誑小兒示鑷者擔刀為我入巖阿林下頭陀懶慢多亂髮一髼經歲久不勞將禍與檀那善道者居山山居道者只居山城市諠譁總不關驚破石床空夜夢海天飛月上欄杆述己心事左右思量皆不得如今索性沒躊躇飢來喫飯困來睡一任生涯在艸廬述懷半間低小尖頭屋白晝閑眠一老僧松竹經年清雨眼自思無法上傳燈寄琴士火柴頭上多琴意折腳鐺中意更深流水高山閒日用子期猶謂我知音分歲殘僧幾輩在寒爐話好年窮事亦無惟有七斤衫子在大家披去嘴都盧開道者遊眉山髑髏眼底眉山老拄杖頭邊著意看蜀道難兮川水巴歌和出腦門寒次古人韻示眾五首無量劫來閑日月微塵剎數舊生涯雲門北斗藏身句天上人間總一家其二雲滿千山又萬山茆房深鎖寂寥間海天紅日飛窗上撲碎崑崙夢未還其三山花山景對空顏春色融融碧嶂間欲問古人山隱趣白雲來去日閑閑其四老我年光似不多堪嗟身事太蹉跎坐禪禮誦全無力惟有工夫久不磨其五山中久住事多便樹葉藤花屋角邊筍焙茶烘收拾了閉門一任倒頭眠示觀教轉讀轉多心轉煩何如放下念頭安翻思拾得寒山子赤手相攜入鬧欄送禪子子去勞吾到竹門屋頭松老不知春相期若要歸來早共與鋤山種白雲游少林乞語少室風光若與論湘潭雲接楚山雲石人肝膽頻傾盡不到一回安死心示空有之執有禪可悟為魔語無悟為禪更是魔除此兩公案外何妨道者口波波月庵皎皎虛空掛玉輪當窗懸若祖師燈四檐光浸茆房白忘卻禪床冷似冰維舟維卻孤舟擲卻竿掀天捲地亦閑閑年來長袖絲綸手心在眠鷗浴鷺間祖心九年面壁若為通一旦思歸伎倆窮父子不傳真秘訣無端鳥語竹籬中山宇吟山宇清寒一枚衣夜寒爐火尚希微多燒黃葉身餘煖不著人間是與非其二地火煨烹待死時人間無事可貪為口封白醭灰封面倒岳傾湫似不知其三昨夜睡濃人在夢忽然記得去年時猿來偷我樹頭果板折當窗那一枝其四庵鎖雲巒樹鎖煙淡濃蒼翠筆難傳石邊添個頭陀坐一幅丹青世外懸其五了心心了何心了心了心無無亦無到此若言諸祖意猿聲啼處月輪孤其六住山年久客情疏雲水相參厭起居不必擔禪來問我老夫心念尚空虛其七身事與誰閑理論自家做夢自家知天翻地覆無干己坐臥經行總若痴其八山雲水石道人家方寸常開不謝花風味與人真個異夜深撥火自烹茶其九山人自適山中景紅白花開杜宇天笑我形模無可據惟憑翠竇度長年其十聖量凡情路已窮宗門參叩若為通鳥飛窗外頻頻語一樹山茶放晚紅其十一三春已謝夏方除蟬噪風寒秋欲餘水葉滿巖冬又近柴床煙火日干午其十二掃石跏趺默坐間春深幽鳥亂啼山白雲愛我庵前地與我常年共放閑其十三怪底山家與事休刀耕火種日無求平生伎倆惟餘此半榻雲埋在石樓其十四縛木為床艸作氈山中富貴只如然絕無車馬來林下門掩潺潺落澗泉其十五水石煙霞不自誇目前境物盡生涯未知人世何更變常見巖臺有落花示海清巖示有堂堂觸處知無來去也更無依子規啼落中天月滿樹花開血染枝示喜巖欲成佛去有何難無奈人心自不安舉起話頭休放逸通身拶得骨毛寒贈泰講主從禪棄卻心囊叩祖禪始知雜毒自相瞞黃花翠竹分明處認著依然又隔天寄陶仁能居士深山傍石今年冷雲氣終朝逼體寒獨對紫爐烘脊背任他人事苦茫茫五言律山行我獨愛山居空冥煙水餘行非公務迫吟為野懷舒入水逢僧話沿崖見艸廬相攜歸作宿又過一菴居宿晚村眺望前村近桑麻路欲迷過田衣拂水緣徑履沾泥遠嶠寒煙合空林夕照低村翁留我宿也解說禪機遊廢寺古寺是何年山門自悄然殿空容鳥入樹老引藤纏有客獨題句無僧共坐禪息陰依樹坐怪見虎當前與僧懷省別之蜀巴江雨欲收去去莫淹留風景應牽思煙波不斷頭猿從危石嘯舟向急灘流如過黃牛峽方知險處游遇隱者杖策雲間去迢迢入薜蘿踐崖登白石行徑踏青莎樹密連居址橋危隱竹坡人煙皆四絕惟我獨經過入古峰寺樓閣微無有雲霞最上層扳蘿緣屈曲踐石度崚嶒蘚壁三尊佛龐眉一老僧倚巖如幅畫夜對一龕燈宿荒院行歸山院晚煙火隔人家垣倒自來鹿艸深多聚蛇空廊無月照古殿有雲遮年代尋碑辨文章半蘚花羨翠巖道者結廬潛遁久絕足道名奇雲外猿聲斷松間鶴夢危人緣從此盡世路已相違翠鎖千巖壑幽懷只自知進庵山舍庵結雲深處脩然遠世間猿扳枝落地鶴背日還山溪水心同淨巖雲趣與閑道人居此處何事得相闕寄玉林居士住山茆屋最幽清玉林久棲止松音風遞來山夢猿驚起坐臥外無禪心情皆至理回視紅塵中誰能得如此書木葉寄友述我山居事寫葉頻寄與意匪外葉間情還出葉底泥牛產犢兒石女生孩子此說古之疑不疑能有幾為道深題墨竹誰寫雙資簹半晴半帶雨榦直挺青琅葉疏攢翠羽清容禪室懸瘦許山僧侶倘遇老香嚴定將公案舉讀林間錄太古淳風絕期誰寄此音掃空文字跡直指祖師心法類皮猶髓林編古亙今追思何已矣三嘆付瑤琴山房獨坐山房無一事西日送殘曛飯取胡麻煮香將柏子焚草坡聞牧笛松塢響樵斤怪底窗昏黑簷前一片雲山典寄魁太初盡日巖房老幽居自獲便死生無定日坐臥任長年豈謂禪非學惟知夢是顛身前身後事鳥語竹籬邊寄友人孤客發吟懷悵望雲樹久江頭浩浩波堤上依依柳分榻在今秋合單思故友斷鴻飛不連何時得同首船出江東小艇出江東江流曲似虹盟鷗閑倚掉聽雨暫推篷兩岸翻波急三山擁翠濃新河多故識款我日從容因事感懷懷古期誰話臨風慷慨多世情難測度光景易消磨驛騎驚晨鼓官船發夜歌世人忙不著令我笑呵呵山水圖為李用之書良丁善丹青所得意外意紙上移江山筆端轉天地楊柳護煙村雲霞鎖蕭寺索我一題詩對之起幽思山趣吟我趣山幽逸山深任寂寥種松緣徑側架木倚山嶕巖瀉千尋瀑園滋百品苗為何人少到陡澗不橫橋其二我趣山幽逸依然覺興長懶從諸事變推去一生忙簾捲溪光碧窗含樹色蒼閉門回俗轍應笑自家狂其三我趣山幽逸秪緣事不多銜芝纔鹿去扳果又猿過短杖扶笻竹輕衣綴薜蘿何勞加別念有念即成魔其四我趣山幽逸山幽豈易言但容來老衲未許過高軒泉眼石邊活鳥聲花外喧紅塵無路入風景似桃源其五我趣山幽逸柴門無客敲屋頭鴉報曉松頂鶴爭巢供粥燒新筍烹茶摘野蒿彌彌心所以天地豈容包其六我愛山幽逸平生酷愛山高登那畏險飽翫不知還選地幽深處誅茅一兩間因茲清己智竟不與塵扳舟泊泛舟隨所住相與俗情違興得五湖樂心閑萬事非人疑天上坐鷗訝鏡中飛晚泊蘆花渚猶如紙帳圍其二水國微茫處凝眸景趣多天光船底漾雲影棹邊拖動我清幽興聞他欸乃歌不知臨去晚落日蕩狂波其三行舟與泊舟誰解悟心眸身世搖雙槳功名起一漚纔離楊柳岸又入蓼花洲識破塵勞事撐歸彼岸頭其四海闊天空際山僧夜放舠撥煙雙短棹穿月一長篙蜃吐千層閣虹垂五色橋幾番衡逆浪直欲上重霄其五江靜雨初收湖光滑似油岸如隨棹轉山欲趁波流牽興多浮荇忘機足野鷗夜聞漁父笛吹破一天秋其六我住船兒小悠悠興轉多微風吹短棹細雨拂輕蓑頗似陸魯望難同張志和欲歌般若偈惟恐驚黿囂其七巨浪轟雷作扁舟不險凶搖搖隨順逆泛泛任西東天地浮沉際蛟龍出沒中漚生復漚滅誰與共磨礱其八五板尖頭艇撐來傍柳橋清流堪濯足長石可伸腰罷繫蕭僧缽將捐許子瓢笑他躋要者如弄海門潮其九何處占清涼煙波望渺茫暫離兜率界直入水雲鄉小艇乾坤大短舟日月長晚來龍女獻放出寶珠光其十來去復來去猶如水上萍衝煙過荻渚隨水傍沙汀渡口求漁叟船頭狎鷺人相逢惟一笑即是息心銘七言律紙帳一團虛白墜輕柔護我禪床分外幽身在芸暉堂上臥神于銀色界邊遊素雲助煖春常在霽月凝光夜不收好是枕邊蝴蝶遶梅花有夢到羅浮寄洱水道庵居士機前一著虛空笑說與吾家居士知洱水味同滇水味今人眉似古人眉春巖鳥語陳心賦靜夜猿聲繼祖辭鐵壁銀山通放倒叮嚀珍重莫狐疑道中望靈峰寄秦上人海門煙霧日沉東曙色濛濛帶雨風古寺半空丹壁裏幽林一望畫圖中雲埋鶴夢松聲細石近龍泉水眼通勝覽江山觀未足寫懷留寄梵王宮遊山寺招提住近水邊山我亦驅馳策杖扳萬境不關情寂寂片懷常靜日閑閑樹頭鳥自雲邊到渡口僧從月下還坐久不思心所以就中端的外人間省病病繫床間豈奈何如今既好莫蹉跎患中苦楚心當省世上雄豪眼莫過撚指光陰安久計落山日色去無多慇懃為報同衣友切忌平原自起波其二無量劫來憎與愛相非相是更相悲幾經妄誕徒生受如許牽纏何了期個念灰時真智慧此心歇處即菩提悟迷迷悟空花翳堪笑堪憐類不知拄杖付徒永昇作昔年行腳賴攜持倒握橫擔總得宜撥亂雲根天地塞攙空華藏佛魔迷隨高就下乘渠力涉險經危苦不疑付與吾徒收拾去兒孫萬古作標題書壁間無量劫來今日事何須向外苦追尋山雲水石平生志淡薄煙霞不老心萬法已從當處絕片懷曾不與時情道人索性渾淪說一點靈光亙古今自省寄寶峰一別金陵又九年閑情只在水雲邊茆簷三尺低頭入柴火一爐縮腳眠聚散如雲安久計人情係妄暫留連山夫見解惟如此懶慢無聊與說禪廚丁言盡炊茆屋深居煙雨邊四時風味只如然勿勞計較來朝事且自安閑今日便缽內無食尋野食坐中有客但隨緣老夫已不將身口策杖區區造市廛臨老述懷待死朝生一老禪滿頭白髮九旬年缽盂飯飽堆堆坐心地空餘默默禪有口懶能尋話說忘機寧肯再談玄所言千古人間事夢幻空花總自然示眾老病死生皆預定昔非今是總妄求欲休歇處宜休歇得自由時且自由殘日聽其來去速漏形安保夕辰留坐推湖海多禪老幾個蒙余得到頭送懷德上人一錫閑雲到處禪花濃柳翠正春妍多年埋沒無生話今日方知有是緣開眼自然明物理歸源切忌亂心田老夫相送憑何據任爾東西南北邊猿鶴山林日遲睡起坐披尋高望誰人得滿心萬事總成雲聚散一身都付夢升沉功名未必空為有富貴安能古到今卻笑頭陀癡老問尾巴真箇說如新分歲次中峰韻二首山居分歲冷如冰和影渾無只個僧老病一身煨地火坐眠半榻偣巖藤欲言有道誠魔說更謂無心續祖燈莫道新年聞佛法舊年佛法又何曾其二叢林藥石己情灰豁眼惟觀窗外梅截斷聖凡無繫綴掃空雲水絕徘徊低頭合掌期誰共運土搬柴獨自回老我說禪唇齒冷破窗燈影照巖臺示眾參禪家教說如何切忌聰明知解多欲認識情神鬼窟已成知覺見聞魔面皮裂轉加精進志願堅來悟剎那脅下放眠高舉話時來刻去勿蹉跎達磨見武帝達磨西返豈千年面壁巖中淚若懸不識柳煙金鎖殿空遺蘆影玉街禪當時歌管蛩聲墮去日風雲雨色連惆悵蒼茫無限恨後人將作話頭傳雜體擬儒書語仰之彌高寶劍分明未是刀凜凜寒光逼人膽虛空匣裏久收牢其二鑽之彌堅游春公子勒金鞭不到黃河心不死到了黃河亦只般其三瞻之在前青山一片白雲漫謾到村坊問王老向言昨夜為燒錢其四忽焉在後白日鬼迷思念咒玄關金鎖不能藏直入蟭螟眼裏走旅癡十首擬寒山意髼頭齬齪子事絕人難跂養氣塞乾坤混跡居廛市欲去則便去欲住則便住住兮與去兮縱橫無礙處何用苦勞形百年聊寄寓舉世一推之宜笑還宜睡其二拾得與寒山顛風面不洗吟詩無偶對談笑有條理來去莫捫摸隱約無依止逢人只是笑人錯認癡子而我慕斯人學癡而已矣其三我癡真個癡癡中人鮮知放曠復放曠俱無安與危作佛乃虛緬成仙在何時相逢有青眼不須亦不須其四寒暑一衲衣且無富與貴人笑我如癡我笑人莫會豈無悲與歡亦有驚與懼所以我逢人愈加笑而戲二者何了然無榮亦無瘁其五世人俱發粲獨我作旅癡我請人洗耳聽我癡論之天地一癡物有道猶不知天地既如此我癡復何疑回首望西山日薄無多時其六一朝又一朝癡人何所係舉首見青天白日繩難繫從人笑我非惟我容人是我于非是外斷不分譏譏一笑兩儀間無處著癡字其七我已知我我人莫知人人我知身是幻誰意知為真年來已作癡和光混其塵若癡人未會有夢休云云其八東街剛鬣嫩西市柔毛肥宰人大恣縱市者無度思寒拾曾有言自殺自食之仲尼忘肉味子輿遠庖廚為僧遵佛戒不食非吾癡其九學禪禪莫會學詩詩莫成學得癡中理百事都無能人來問我法喝不轟雷聲人來索我句吟且為蟬鳴衣麻勝衣隱姓勝登名世無閭丘公孰能知我情寄言肉眼兒莫以我為憎其十我癡癡無學學之貴穿鑿癡無鑒聖凡癡不會吟作人情萬卷書我知我弗如人全三窟計我知我皆輸癡兮癡非錯而能有先覺視天天蓋頭視地地承腳跳出天地間慎勿被他縛
