body:
  text: 古庭語録輯略序方外舊史皖舒吳應賓撰蓋余所事華嚴善知識有朗目智和尚云犝牛是牿則昆明歸化古庭堅公相好法身之所攝持也談麈高揮則浮渡華嚴古庭堅公言説法身之所震動也兩公皆滇人先後百四十年間薪火交光水月互影將母方網三昧入定出定而作佛事耶病堂散人睹面聞名善根雙托余則幸矣居久之智公以藏輪之役去浮渡而金臺於時故鄉陶使君葛閬方在公車用南詢禮請益世尊拈花以前一段公案針芥乎水乳哉余不能舉其契而堅公山雲水石斷爛葛藤從智公篋笥中起向葛閬眼根放種種光作師子吼矣哲人既萎弟子不能守典遺文轉徒若存若亡幾三十年而愚子道凝射雉白門得為水部紫閬操几垂一𦕎次出所購堅公繫鶉衣寶哲昆葛閬暨厥宗會稽大司成弟石梁刮垢磨光新其載牘名古庭語録輯略凡四卷以續無際之慧命而芽臨濟之枯禪使愚子投我一篇徵引商之和於首簡余雖錮疾反扃嚮異瞻奇崖略以耳而三嘆焉咄哉此翁用心處若師王之奮全力于一兔會心處若因陀之合多影于一珠任運酬機卷舒無迹廣于輯略東語西話鑄古陶今徹困婆心單提向上譬如雪山肥膩純出醍醐撮要鉤玄則華嚴大意一篇字字圓融言言行布勤求實到舉一蔽諸他所芟夷知不無拖泥帶水可謂干將出沒尚惹煙霞陘棟在山寧辭斤斧陶氏三君子功古庭也功曹溪也功靈鷲也非復算數譬喻所能繇旬而劫波之矣讀其書不可以不知其人昭昭于初冥冥于卒豈三君子所以論世而天界之席既禪歸化之鐸未衰栽竹垂絲逢場作戲夷考幻住倫次闕如也不知無字毒鼓所斷命根為一為多為半為滿飛精綿邈尚友謂何豈得髓而棄皮抑舊章之無述而歸化梵剎望之皋如麟臥狐眠春來秋去諸君子業為捧心有筆如椽將亦鞠為茂草而浮山野史謀于苔蘚乃屬汗青所載堅公涌沒津梁因緣粗具參承茲決以事係年考諸行腳供通如對二月非是月影奇哉直指張公睹師貌于驅烏而祖印三旬不愆于素讀者取為久行妙道之符大蘶倫稱天順癸未禮師足于浮山法窟而已付受荷擔不言何等三十年胡亂鹽醬多少亦未之有聞也君子以為二憾而金谷之歌伽藍之説一真法界觸境全章文字言音了與輯略諸篇不別為堅公廣長舌相無疑也辭世偈言來從華藏海中來文殊普賢去從華藏海中去觀音勢至祗今還有不來不去的麼咄總在這裏智公聞諸歸化灌我耳根足使吊古英靈作第一峰德雲想而遠大師局前帶後狼籍生涯拈來臨濟金剛網推入昆明華藏海直得水枯石爛雲散山空向五十三善知識前同時作禮故知智公齒牙別有堅公面目矣佛手驢腳影現重重忍鎧悲輪詎堪思議是編同事諸上善人大都下座毗那分形震旦而余呵殿智公于浮渡之轂斯已勤矣卒業狂喜數事拾遺得其方便克諧蘭若寓乘金湯究竟堅固雖妙吉神手加我囪門何以代此而水部公亟以囑纍為提獎也倘亦天廨華嚴旁參熏變慈善根力從臾刳心施及藐諸傳言送語於劓刖之法供養而增若焉異日者堅公法界願王如時成熟未委此淨信聚誰為牧女誰為純陀一室千燈雲興瓶瀉而昔人來去華嚴顯密任持法位常住必斯文之為引業也夫崇禎癸酉秋八月庚午朔古庭祖師語録敘古庭祖師語録序能仁氏以一大事因緣出現於世而今之學道者或數數於福田或汲汲於淨土或匐匐於教海至於正法眼藏涅槃妙心則茫然不入余每以是請正識法者適於京邸遇同年紫閬陶君商及最上事津津不置復談滇中異人有古庭祖師者簡易直截每以無字話斷人命根與盤龍祖師異時同地乃盤龍肉身尚在而古庭道場已為蓁蕪心恫者久之今春過虎林謁陶稚圭先生時適紫閬兄在坐手一編示豫曰此即古庭集也從煨燼中得之其言掃盡葛藤獨露本地風光再四讀之心花頓開幾欲忘倦豫謂陶君曰安忍我輩得此如意寶而不與人共乎遂與同志謀鋟之而字漫漶不可讀復取正於稚圭先生先生以人天眼目作佛法津梁為之刪其繁亂正其謬訛而古庭又開一生面矣噫垢衣除糞徒慘長者之容乞人佩珠徒發良友之歎是集也正法眼藏涅槃妙心舍此其誰與歸第蘊結有年非得紫閬兄之表章則不出非得稚圭先生之刪正則亦不傳謂之古庭之異書可也謂之陶氏之異書亦可也雖然讀是集者須向未有古庭以前覓消息始得平實居士錢啓忠盥手題古庭輯路序資善大夫南京禮部尚書張惠撰夫山雲水石輯乃古庭和尚以平昔所做工夫疑團子破處不恃棒喝出於語默欲其開鑿學者由此而所以作也和尚天姿高古行解冰嚴肆舌宗門了無泥滯毫放三昧具大辨才觀夫録者文浩義博絶後光前耀古振今擊賢啓聖真濟世之丹鉛人天之大眼目者也余聞釋迦拈花迦葉作笑以此繼之謂正法眼藏涅槃妙心察其所以誠也目擊而道存不涉文字蓋謂佛佛授受祖祖禪傳有是然也豈欺人歟且夫和尚布法於金陵卓錫天界時學徒彌衆而無乏目所以具大慈悲舌頭拖地大伸普説用無不到理無不中一語一默一機一事譬夫日正於中天而無不正也大矣哉和尚誠無際之正傳機緣吻合際囑曰吾居川中得法之徒十有餘人正法眼藏付囑於汝吾道至子大興于世所以謂臨濟一宗復振於今日者矣其録之文言句義而自然神機俱到大法變通可以與佛祖語言齊驅並駕遺于不朽其徒一貫上足編次成録徵余序以冠于篇余視所録皆心地所造融通無礙欣然作之而示學者以為進修一助云大明天順歲在丁丑孟春上元古庭祖師輯略目録卷之一行腳法語為四衆説戒心要三昧玄章警徒訓徒卷之二説三昧禪定華嚴幻住略迹華嚴大意示一宗頭陀無字直説火爐頭話牛首日録卷之三論知見證性書拜母通壽兄古松和尚書跋雲谷師所書普賢行願品跋頌拈頌卷之四偈贊先師無際和尚道感文并偈古拙老祖真讚釋迦佛出山相贊大悲菩薩相贊魚籃相贊達磨相贊善財南遊圖贊羅漢歌了一歌皮袋歌真樂歌詩七言絶句題牧牛圖併引入山尋牛荒溪見迹見牛必獲得牛馭制牧牛受策騎牛歸家忘牛存人人牛俱忘返本澄源入廛垂手囑悟心禪客宗門揀要并引二首道人山居尋隱者贈明道禪者為海嶼菴書為清道人書間寂軒送禪者隱山為老宿山隱無客軒為獨翁題為清滿智淨德五禪客乞五首擬古德十可行十首入室普請粥飯洗衣掃地諷經禮拜話道四照用四賓主四喝語三玄要示客問念佛參禪之意金臺書示學禪人僧老獨居示衆侍者擊鼓參鐘從生放下床坐中聞猿啼春吟曉處禪蒲二首夏日與友登山送僧歸蜀侍者別我雲林精舍述懷請道者隱居答張文勝示鑷善道者居山述己心事述懷寄琴士分歲開道者遊眉山次古人韻示衆五首示觀教送禪子遊少林乞語示空有之執月菴維舟祖心山字吟十五首示海清巖示喜巖贈泰講主從禪寄陶仁能居士五言律山行宿晚村遊廢寺與僧懷省別之蜀遇隱者入古峰寺宿荒院羡翠巖道者進菴山舍寄玉林居士寄山書木葉寄友為道深題墨竹讀林間録山房獨坐山興寄魁太初寄友人船出江東因事感懷山水圖為李用之書山趣吟六首舟泊十首七言律紙帳寄洱水道菴居士道中望靈峰寄泰上人遊山寺省病二首拄杖付徒永升作書壁間自省寄寶峰廚丁言盡炊臨老述懷示衆送懷德上人猿鶴山林分歲次中峰韻二首示衆達磨見武帝雜體擬儒書語旅癡十首擬寒山意古庭祖師語録輯略目録終
