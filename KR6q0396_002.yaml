body:
  text: 說三昧禪定禪定三昧委在當人諸佛不傳之宗列祖通誠之旨若是箇生鐵鑄成無面孔漢到此不涉疑思一肩擔荷方有少分相應若半信半疑半進半退卒不能搆學者最初行腳一念便要信自己及一切眾生一一具足十方諸佛大三昧定一一具足十方諸佛大三昧寂滅禪一一具足十方諸佛大三昧解脫門一一具足十方諸佛大三昧空際海一一具足十方諸佛大三昧無礙王一一具足十方諸佛大三昧無昧智一一具足十方諸佛大三昧精進力一一具足十方諸佛大三昧寶華王一一具足十方諸佛大三昧辯才用一一具足十方諸佛大三昧無畏說一一具足十方諸佛大三昧真如藏一一具足十方諸佛大三昧圓覺域一一具足十方諸佛大三昧慈忍行一一具足十方諸佛大三昧圓明種一一具足十方諸佛大三昧無相見一一具足十方諸佛大三昧莊嚴劫乃至一一十方諸佛一一所具一一大三昧禪定一一大無礙三昧禪定之說而一切諸佛一切眾生一一悉皆平等此三昧學者不可作無事會若作無事會則著無事魔不可作種種知見若作種種知見則著種種知見魔若作空寂寂空見則著空寂寂空魔若作正見則著正見魔若作坐禪禪觀見則著坐禪禪觀魔若作空有有空見則著空有有空魔若作無空空無見則著無空空無魔若作空慧慧空見則著空慧慧空魔若作智愚守尸見則著智愚守尸魔若作知解融會見則著知解融會魔若作避喧入定見則著避喧入定魔若作觀空無物見則著觀空無物魔若作寂靜無境見則著寂靜無境魔若作無念無生見則著無念無生魔若作動靜即常見則著動靜即常魔若作解悟變通見則著解悟變通魔若作智慧靈心見則著智慧靈心魔若作常樂無我見則著常樂無我魔若作會佛法見則著會佛法魔若作神通無礙見則著神通無礙魔若作沉空無死見則著沉空無死魔若作能所隨流見則著無我隨流魔若作執禪守默見則著執禪守默魔若作諸法合頭見則著諸法合頭魔若作一念無為見則著一念無為魔若作諸禪即法見則著諸禪即法魔如上所說一一魔見悉是學者未悟之際以其未悟凡有所說所見皆至魔論學者若是箇真正衲子深發大願事善知識將世間一切富貴恩愛名利豪傑妄想貪癡是非人我及佛見祖見玄見妙見一大藏教乘見千七百機緣見諸子百家見盡情打併使其空空豁豁只箇空空豁豁一念亦要去之盡淨又信我此生一一務要依十方諸佛所教依十方諸佛所行若不至十方諸佛無礙解脫寂滅正受盡百千萬億劫將一語為利養故妄惑于人世世生生報入地獄學者固此一念若果悟去于一塵一剎一切塵一切剎剎塵塵剎現大清淨當知這一念及一切念而念念不可度量不可思議十方諸佛剎極微塵剎數大空寂三昧海大解脫三昧海大無礙三昧海大圓明三昧海大智慧三昧海大不思議三昧海大不可窮盡三昧海大無邊種智三昧海大般若無空三昧海大無見見三昧海大攝一切佛剎三昧海入一塵微塵剎三昧海一切諸佛剎海三昧入一微塵禪剎海三昧一一諸佛剎海三昧入一一微塵禪剎海三昧現諸佛三昧入恒河沙禪定三昧入一念禪定三昧一一念禪定三昧至一念海禪定三昧一一念海禪定三昧悉皆具足十方諸佛佛剎三昧禪定微塵剎海一一三昧海一一三昧剎一一三昧剎海一一不可窮盡一一不可籌量如我所說十方諸佛大寂滅性海一一所具一一微塵一一佛剎于一一微塵一一佛剎一一微塵佛剎至于一切眾生一切念一切心一一一切心念具有諸佛言詞禪定三昧一一諸佛譬喻禪定三昧一一諸佛所證禪定三昧一一諸佛分布禪定三昧一一諸佛大小藏乘禪定三昧一一諸佛了義非了義禪定三昧一一諸佛本因修證禪定三昧以諸佛一一禪定三昧而一一融通一一無礙一一念一一心一一心念一一總而禪定三昧也學者到這裏正好將十方諸佛髑髏一切眾生鼻孔穿作一串提向十字街頭橫拈倒用放大光明作種種可畏相好開種種大寂妙門一一可畏相好具現十方諸佛極微塵剎之禪定三昧受用一一極微塵剎之塵具含十方諸佛一一大不可思議海一一無盡藏海一一大三昧王海一一大寶覺妙海一一大淨智妙海一一大莊嚴域海一一大言詞無礙海一一大光明無變異海一一大化佛無數意海一一大會十方極微塵剎剎塵諸佛于一念一一念念念無來念念無去海以此一一諸佛三昧妙海至我本覺妙明無礙三昧海中一一開演一一宣示或歌或舞或逆或順一一歌舞逆順至使十方佛祖天下老和尚吞聲結舌一大藏教理盡詞窮如上所說一一皆出山僧心地法故為學者所演茲因禪者祖心及一眾禪德索說禪定三昧以遺將來不知不覺向一毫頭上流出許多幻說譬彼幻師依幻而現種種幻事不可盡窮彼幻如是一一所有不可言說乃至幻于幻幻于幻幻說皆從一幻幻出無礙如我所說亦如幻師于一毫上種種幻幻說之不盡如大日輪依空而有光滿閻浮如雲雨潤沙界不可限量不可思議我此幻者所說諸幻皆我幻禪幻定一一幻幻假使十方諸佛集百千萬億之舌並作一舌向我所說禪定三昧卻難下口末後一句能斷諸玄謹白同禪擬思則錯華嚴幻住墨跡性普禪人持天目幻住翁筆卷索語曰我何人斯敢辱先聖固辭弗獲問曰禪人何業普曰旦夕誦華嚴經師曰華嚴我不問一毛孔具含毘盧不思議海種種三昧至八萬四千毛孔你道那一毛孔中具載道得則與汝書道不得則持卷去普不知所答曰吾不書矣普無措謂曰言外一機修多教詮之不及聲前一著千七話盡之莫能今古英靈討頭不著往往坐在語言文字界隔多生輪迴不息中峰舉達磨大師謂外息諸緣內心無喘心如墻壁乃可入道老師如將筆向虛空中橫織豎織織出許多錦繡如優缽羅華次第交錯及乎織到絕筆收拾處恐學者不知好惡向他筆頭上描模畫樣遂告曰學者但念念心心如墻壁去有日必知達磨開口落處也只如所教中峰老師與達磨老祖大似教小兒讀上大人一般禪德還會他末後句麼如要會卻也不難山僧為禪德點破會麼上大人可知禮也不然直下將墻壁心貼在額上行也心如墻壁坐也心如墻壁忽然錯腳踏翻大地千七百話修多羅教一一總為光明寶幢禪德我于筆端一毫頭上竭香水海掀彌勒樓倒毘盧殿直得微塵佛剎諸佛諸善知識俛首墮舌我以我身一毛一孔入一一諸佛不思議三昧經諸佛不思議世界以一毛不思議世界至百千萬億一一百千萬億毛不思議世界一一毛孔不思議世界皆具百千萬億微塵佛剎諸佛不思議世界一一世界不可思議一一諸佛不可思議一一微塵剎佛剎不可思議又我以不思議毛孔諸佛剎海微塵諸佛世界入彼普賢菩薩一一普賢一一毛孔彼普賢菩薩一一毛孔一一普賢一一普賢毛孔一一普賢身毛孔中具有百千億微塵剎彌勒樓具有百千億微塵剎華藏界其一一華藏界一一彌勒樓一一毘盧殿我一一演說一一百千億微塵剎佛剎世界諸佛大清淨不可思議三昧是時普賢菩薩于一一佛世界一一分身坐獅子座住三昧定運無礙辯舉神通力經彼一一毛孔微塵剎佛剎諸佛世界則知我身入彼一一佛剎微塵佛剎諸佛世界一一住持一一演說一一佛剎微塵剎諸佛不思議我以一一佛剎微塵剎諸佛世界一一三昧一一神用一一神力則知諸佛一一世界則知諸佛一一妙用則知諸佛一一言詞則知諸佛一一三昧則知諸佛神通藏則知諸佛智慧海則知諸佛一一智慧神通三昧一一言詞妙用世界一一空華夢幻一一了不可得而我了彼不可得如空華如夢幻如彼諸佛世界海如彼諸佛三昧海如彼諸佛言詞海如彼諸佛一一毘盧華藏世界海諸佛幻一一毘盧如來不可說不可說轉不可說轉轉不可說速起速滅相繼相承不絕普賢菩薩向十方微塵剎一一微塵剎不思議世界經千百億微塵剎佛剎不思議世界海劫及微塵剎一一海一一沙一一劫而我以毘盧如來三昧入彼一一普賢一一眾生充滿無量一一不動以不動故而我一一身遍滿百千億微塵佛剎諸佛世界一一不可思一一不可議性普禪德若知山僧所說則知中峰老翁所說其所說意無古無今無去無來終日華嚴華嚴終日卻不待爾循行數墨也其或不然則不可依山僧所說虛閒過日生死事大無常迅速不知不覺老矣死矣眼光落地四大分散這裏作麼生拆合去至視至祝華嚴大意華嚴之說其義也大其文也長非盡得其妙者難以筆舌毘盧老人一真三昧于當人分上最真最切開口也說著不開口也說著開口不開口總說著一切佛法一切玄妙一切機用一切拈提一切棒喝一切語言一切文字一切三昧用則總用不用則總不用用與不用總不相礙世尊陞座文殊白槌云諦觀法王法法王法如是世尊便下座文殊便是開口用處世尊便下座是不開口用處到這裏世尊說箇什麼若道有說文殊早自錯了若道無說世尊陞座又自錯了若論華藏大意說與未說錯與未錯開口不開口舉目之間一點瞞人不得如趙州問投子大死的人卻活時如何子云不許夜行投明早到似此一問一答如常人說話又不曾作機會又不曾作禪道佛法會爾之江南我之湖北爾之天上我之人間四方八面無不相應若不到與麼田地縱將一大藏教一口吐出堆山塞海總無用處世尊未陞座文殊未白槌趙州投子未相見已將全機交付了盡華嚴法界香水海一切諸佛諸善知識卻無措手腳處經云如來深境界其量等虛空一切眾生入而實無所入既無所入安有所說此外不可為你別加方便古人云參須實參悟須實悟如懶融未見四祖馬祖未見南嶽他何曾似今學者東卜西卜個個死心榻地學者只知開口處將謂容易安身著腳不知未開口時縱是佛祖也難近傍僧問雲門如何是一代時教門云對一說一且道與世尊陞座文殊白槌差別多少僧問趙州萬法歸一一歸何處州云我在青州做領布衫重七觔這等說話前後遠近宛爾一般古人行到說到一一皆在大不思議海昔香嚴和尚在溈山問一答十問十答百溈山向真參實悟處痛與一劄嚴不知所以于是入南陽卓菴擊竹有省後出世曰老僧四十年方打成一片趙州和尚二十餘年除粥飯屎尿是雜用心處高峰三十年不出死關先師四十年惟一念長慶稜公坐破蒲團七箇山僧做工夫十三年身不放倒今年七十餘猶念死生未敢離于正念古人念念在定于生死不亂今人念念在亂于生死不定學者還知正念麼如前所說乃如來深境界是也山僧昔年到先師處徵問到無結角下手處不免盡力掀倒先師說箇是字如今勘來多少錯任緣隨分且待命根子斷山僧每于華嚴留心據我所見善財參五十三善知識未嘗動步五十三善知識教授善財未嘗開口我毘盧遮那如來雜華藏海一字一句一切字一切句一一具足四天下微塵數不可說轉轉不可說一一三昧一一語言一一香水海一一輪圍山一一毘盧華藏一一彌勒樓閣一一諸佛菩薩一一大善知識一一觀彼所說諸佛華藏一一語言三昧一一辯才三昧一一神通無礙一一佛神力莊嚴佛剎微塵數諸佛世界一一諸佛世尊所演佛剎微塵數三昧門不可思議微細微細極微細處則知諸佛菩薩及五十三知識所說佛剎微塵數諸佛藏海一一三昧于我自受用一真三昧遮那如來無增無減無彼無此華嚴藏海諸佛菩薩諸善知識各各盡彼神通三昧向我遮那諸佛佛剎微塵數三昧大不思議海轉不可說三昧一一莊嚴一一文字一一摩尼寶光明一一佛剎微塵數寶