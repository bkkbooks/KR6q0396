知一切眾生本來具足若無靈骨智慧者吞箇無字在意根下如中毒藥從生至死決不知無字所以向此用心也不難便打併意根空豁豁地一日勝似一日管取念念相應學者看無字如生死冤家切不可偷心怠慢疑云趟州意作麼生無正是得力下手處疑時于一切有無得失靜鬧閑忙總恁麼疑疑來疑去不覺疑情破祖關透則大事畢矣多見人看無字每每被昏散二障所侵不知打點通身坐在昏散裏與麼參禪豈得有靈驗耶為學者說昏散二障下落乃當人一箇恣縱心是苟猛著精神疑無字如流水綿綿不間念念檢點則昏散自遠學者坐中打失無字念無字不得力此是貪愛異緣不曾放下既不曾放于本參正念安能作得主耶苟如信之將憎愛人我苦樂貧富一切所為盡情放捨果如其教自然有箇入處生處放熟熟處放生生者無字無量劫來未嘗相識熟者異念愛染護惜不捨處是幸古人以無字盡力交付我若不死心絕念做工夫此時錯過欲其再會似今日誠難誠難思之思之學者自昧往往被文字知解遞相教授古人卻不恁麼但死心做工夫一言一字具擇決眼情解路絕知見機忘久久參疑自然起悟到此方明古人所言不欺也無字實一大藏教詮註不出惟當人默默用心自去理會其用心理會處亦不得作無字見但參而疑疑而悟除參疑悟三字外縱有方便又不是也千七百則一代時教向無字冰消瓦解不然臘月三十日未免手忙腳亂當宜究之或者謂無字乃趙州一期答這僧之問又謂趙州逢場作戲隨口建立如此豈不迂曲僧問狗子有佛性無州云無這箇無字自是這僧擔來亦從他親口出趙州未嘗添減分毫就他道無如今人多少錯解山僧因問一時為學者盡力吐露學者再不得移易絲毫從生至死疑無字如生死冤家務要親證明白這無字江湖學者商量浩浩天下知識開示學者亦商量浩浩未審學者知識與麼商量為什麼邊事要知端的看破無字始得達磨西來將箇無字上人門戶謂有多少奇特不知十方世界總是箇無及見武帝賣弄不出遂渡江面壁且老胡心為什麼事學者當參看無字若看不破無字則不知達磨下落問學者神光斷臂是知無字不知無字若知因甚斷臂若不知當思古人用心有等開學者疑無字他便障礙恁麼死坐莫若看幾行文字無靈骨學者被他惑引入黑黑漫漫辜負初心志氣者又多被聰明學解喪盡自己切思身寄空門心當厭俗佛祖教誡念念存思無字參疑心心莫捨智眼大明慧光迥出人間天上獨步縱橫逆去順來隨心自在如此方堪傳佛心印接引後昆不然虛喪光陰沉淪生死古人叮嚀殊不為己大抵欲學者究明此事古人為你說得你若不行無奈你何佛佛授受祖祖傳持不曾私屈學者絲毫學者不信心努力向前自家轉便欲佛祖把箇現成受用與你安得有此古云那得天生釋迦自然彌勒此教于學者大有恩惠釋迦彌勒遠劫修來棄極貴尊榮未嘗一食一息不舉念為教化眾生同證同得我等學些知解聰明即謂超佛越祖豈不自欺學此事當人自知下手腳處好向前如何是下手腳處經云言語道斷心行處滅久久參箇無字不知不覺向轉身處得箇受用那時有說無說總現成如今諸方未見有向心行處滅言語道斷處真參實悟看他日用所為便可知也古人一機一境具大智大用從胸襟流出今人也作一機一境要且實無大智大用何故皆緣學力未至耳具眼學者一見則知或若初心盡被瞞了古人云參方須具參方眼目不具參方眼目見他便禮拜喚作懵懂禪和奴郎不辯祖師云不除妄想不求真無名實性即佛性幻化空身即法身法身覺了無一物本源自性天真佛只這裏學者領會得山僧則不許你何故古人則可今人則不可只箇不可山僧與學者大有慈悲在且學者即今舉一念看這一念是真是妄若謂是真從始至終只是恁麼若謂是妄從生至死必不如是若謂不真不妄這裏卻從真妄去也要好學者向此大死一番那時是真是妄總融通于無礙大清淨三昧此事山僧饒舌為學者直直傾出卻無許多計較學者亦依山僧直直做去時時猛省務將無字綿綿疑去疑得東西南北行住坐臥總是箇無字莫顧危亡若如是則不負山僧和泥合水不然非但山僧十方諸佛歷代祖師天下老和尚與爾自己盡被負了讀無字自大慧來無此洩露自高峰來無此詳細真臨濟嫡派少林血胤也埋沒昆明幾百年今日乃始出現人間耳珍重火罏頭話萬法歸一一歸何處疑云畢竟一歸何處復疑云一歸何處大起疑情佛法世事混作一團久久疑去不覺疑釋大事已明十方諸佛歷代祖師天下老和尚所說都只恁麼學者離恁麼別有長處非佛祖之究竟也佛祖相繼之道非語言及情識量要下死志做工夫不然機前句外言說便了豈非情識量也學者死得心地真實做工夫如未悟但默默守去自有箇道理豈不聞古人云久遠劫來受盡勤苦不然便認個語言情識現成說話達磨老子他是觀音大士何故九年面壁做工夫之切大抵止要去學者生死業識若不加工去逼拶欲業識之見自然除去如昧者布網吹風欲其滿也當知此事唯我默默自究然後自證自得自然妙達無礙這做工夫說惟我實參惟我實悟豈得咨學口耳作知解見至此若不切實向前于本參話頭見箇端的口說便了正謂說食欲飽出生死之要了無秘訣惟學者疑古人一則話頭疑這話頭如人中毒吐不得屙不得死生不得其或屙吐死生不得處洞見自己這裏則知十方世界微塵剎土無不是自己更說甚麼妙理玄文單傳直指無量劫來以至今日一一明白根根塵塵悉放無畏百寶光明如或不信便認箇昭昭靈靈困在黑山鬼窟學者不取當知生死緣無量劫妄識成熟今日要與從頭至底掀翻如人落在萬丈深坑須拼命求做出路豈小力量所能是知不捨種種心而悟種種見見無別見心無別心心見無二無二亦非生滅何立斯說不假安排造作必欲孜孜真參實悟到家自知此事要具堅固久遠之心如枯木石頭去果如此何生死不了佛祖不超其或波波挈挈大限到來無本可據佛祖無法與人因我溺于生死教以涅槃因我散亂教以禪定因我妄迷教以真悟一切皆我自生非他力也我既知之豈可恣我而長淪生死耶此事唯人生死急切精進勇猛久遠不退切忌思前筭後欲進而退如果痛念生死將本參正念加疑大疑大悟不疑不悟疑之不絕管取推門入臼到此洞古洞今鑑天鑑地不然生死岸頭大難作主可不慎乎老僧所教出生死痛與工夫作主說甚祖師直指如來別傳直得十方諸佛向我手裏乞命學者孜孜下鐵石冷冰冰心莫問年月深久有無得失但一念不移萬年如此管取無影樹頭猿夜嘯不萌枝上露芳心學禪乃己躬大事非心念痛切具勇猛加精進徹尾徹頭縱佛祖大神通智慧于我所謂生死難與著力學者大起信心信自己受用實無佛祖了無一法生死者由我無量劫妄念所繫此妄猶鏡中相若或了知鏡體本然據實所論超佛祖破生死實當人一切處正念現前更有何法不明祖關不透實欲參學下死志四稜著地又如死人欲愛妄念無所生也東西南北屙屎放尿坐臥經行著衣喫飯輥作一團總是箇正念久久不捨若不悟去管取山僧犁耕有分自佛祖垂教以至于今方冊所載未嘗有不做工夫出生死者其或一聞千悟得大總持則知用力多劫所至今方容易學者不得執容易處若容易領略人皆不肯做工夫也此事非小因緣佛聞半偈捨全身修三阿僧祇劫大根大量信之無惑而今學者說超佛越祖出離死生以為常話我見此說愧之無地生死事大無常迅速說之最險從上佛祖不顧危亡一切處知無別法非大志莫出豈論歲月不得逐句尋言要以念念向己心悟去心悟無法法悟心法法心無心心自法心心法了然何心何法不可以聰明情量工夫做到方始達佛契祖從上佛祖皆以實言欲令實悟不曾教人學知解知解乃生死根本不然非但屈負佛祖亦乃自昧己靈究生死須向意根下研窮不已歲時不忘工夫做到始解自己無量劫來不異今日佛祖種種言說于我己躬未嘗道著一字此生死我不去著力欲待誰人此心湛湛然非湛然相絕去來今只此是無礙圓明三昧學者不得向這裏浸死參而疑疑而悟悟而後得只箇悟字猶是多了欲參學此事先打蕩心地乾淨明白究所參學處用心著力不負參學之志參禪最要緊處在當人用心切耳苟不心切雖念念有箇話頭如水浸石頭縱千百劫不失人身也只是守尸鬼終成何用做工夫要有憤發如一人敵千萬人莫顧危亡見箇端的不然今日明日恁麼今年明年恁麼管取至死亦只恁麼欲參而悟不得縱恣身心逐名貪利坐在欲愛之中生死非世間事也將意識截斷永無相犯若容一毫依舊打入黑漫漫去也諸方說做工夫話正如嬰兒飲水以少為足不知大悟十八遍小悟不計數又謂如人入海轉入轉深時容易哉如今說箇悟處多少伶俐向這裏錯過或者不識好惡于見聞覺知上有些入頭處偷心妄想顛倒錯亂縱見釋迦老子亦不知他向什麼處說他又不知愧恥可不傷乎或者認箇業識向古人方便用處一印印定將幾冊經書搜研裝一肚墨水以為是一員大善知識逢場作戲便有許伎倆不念因果罪報福業欲其念念不妄心心綿密更加綿密有日心神內豁開諸佛心眼便能攝香水海于微塵界裏現寶王剎于一莖草上誠不欺也一念透脫得大三昧種種殊妙此非知見文字口說心授要以禪定無礙大總持力方能相應豈不知圓覺經云無礙清淨慧皆依禪定生佛謂大摩尼寶王無量劫來未曾欠少大丈夫聞恁麼說豈肯埋沉大寶孤困伶仃彼既丈夫我何不然牛首日錄老僧乃山間木石之類人事禪道一無所知獨得山雲水石便欲老死所抱未穩順于情境一上一下迎送往來雖然事不獲已也喚做一時垂手老僧本分處看實未見箇頭尾端正的漢佛法晚矣人心不古于煖熱處大家打鬨不惜罪福不念因果箇箇道好此等與論古風高尚于冷冰冰處澹薄相守佯然不理與其玉石不分彼此方得一懽喜古人云我逢人則出出則不為人我逢人則不出出則便為人似此說古人各取一時之便或出不出或為不為自然有箇理路豈是閒說且道出與不出為甚麼邊事逢與不逢當時他在那裏存坐邇來老僧離浮山到牛首是出不出終日碌碌人事往來是逢不逢以此看來老僧大似箇無機關之木人圓悟老師云若論此事如馬前相撲騎虎頭踞虎尾擊石火閃電光豈許有近傍處雖然大凡一事也要經歷過胸襟開闊痛快也法融未見四祖天人供養百鳥銜花及見後四稜著地不妨穩當到此始知從前所著屈受許多拘束而今而後使伊做模樣與人相見自覺面熱此事豈容有著手腳處冷地推思好一場笑怪祖師忒殺慈悲于己分上也把不住說道理說心性大似憐兒不惜醜也怪不得路遙知馬力事久見人心雖然老僧夜話方丈未免順時將錯就錯以己躬下事大家研究不得認著見聞知覺指龜為鱉喚鍾作瓶牛首靈境祖師道場老僧雖是家空四壁或茶或飯自不相欺一味平等與諸人同于日用豈敢輕昧古人遺風日事之餘不得不以己事遞相較量老僧此來非是共爾等打粥飯過日你等若得一時閒靜勿將己事虛費過了豈不思人命不長光陰易去信施難消老僧日逐間不知是聖是凡若僧若俗一一與論世諦佛法將長補短以權就實未嘗敢欺侮一人如此留心大抵要當人向世事上明得一分佛法于佛法中勘破一切世事豈可離此別做活計或有人向老僧道一大藏教千七百機總是外事那裏覓取佛法世事去老僧向他道怪我不得若不與麼怎得與麼經云譬如暗室中無燈不可見佛法無人說雖慧不能了三十年前老僧行腳諸方學者莫道沒有曾遇幾箇禪和蒲團上孜孜究心做死模樣晝夜歷煉挨拶雖是心事未得發明至于宗門檢點亦不忝古人說死心之眼目也又見幾位尊宿或于山間水邊清心寡慾也不見禪道文章佛法參見者但言老拙不及後生輩不可埋沒佛法大事扶持顛危老僧親聞此語三十年後非但死心舉起此事箇箇笑怪所見皆外道說一切空死箇什麼心地如此之言佛祖掃地石霜和尚云休去歇去一念萬年去古廟香爐去臘月扇子去枯木頑石去一條白練去此是古人教人死心之語中峰和尚云舉心盡屬輪迴路動念無非生死根要與太虛無背向常吞一箇鐵崑崙如此說總是釋迦老人也索塞斷咽喉豈容有一點知見古人謂參須實參悟須實悟有等學者聞此語向孤峰頂上𢬵捨身命恨不一念于生死之際坐脫立亡當念頭起時真有一念喚不回頭之志宿有根器骨者必有箇時節因緣觸著磕著發明己事若是有頭無尾漢自然挨拶不入便謂佛法無靈驗撥無因果胡言漢語魔魅人家男女將謂飲酒食肉不礙菩提行淫行盜無妨般若如此之言縱大悲菩薩奮八萬四千手眼神通救伊不得放命之後鐵圍山間阿波波阿吒吒八寒八熱萬死萬生至彌勒下生轉寄他方求出無期我等既立身空門視生如死縱百年富貴譬猶彈指若大事未明縱放光動地說得點水不漏生死不透總無用處將古人方便之言不顧好歹從頭熟讀年久月深一肚墨汁將白淨心田盡染壞了祖師教人脫生死非教人抱文字若學之乎者也于生死上重加生死參學之流莫存雜毒知解只吞箇鐵崑崙或無字或萬法在伊心田中將五臟六腑七情八欲六根六塵六識內外經書文字一塞塞斷不容絲毫空隙自然得其定力捨身受身如穿衫脫褲遇善知識一聞千悟決然不惑今時道流稍得一知一見將謂佛祖相繼亦猶如此殊不知古人得處千萬辛苦及其悟後見人千萬艱難或遭痛打或受惡罵以至執勞負重種種精進念念向前未嘗斯須退慢凡于所授如飲甘露如獲大寶一旦時節到來東西南北天上人間自然遮他不住到此田地天龍恭敬不以為喜況世名利哉老僧向時見先師無際和尚受盡惡毒手腳一時機契理合敢與古人挽手共行六祖大師稱一切人為善知識佛願一切人至于果位學人苟能領略一肩擔負老僧合十加額古人舉起這著便捨身命一勇向前不顧危亡真實欲見箇下落及其了明恐不確的不惜勞苦尋禮尊宿審其所以豈敢一毫怠慢更三二十年向人境四絕處韜光晦跡保養靈源澄澄湛湛或被龍天推出只向孤峰頂上十字街頭等閑發一言如大日輪光無不及今時參學者最初行腳便立處不實不以生死大事為念又豈肯死得一片心地效古人受一段大苦既無苦志養其利名溫飽之情無因果無羞恥外寂內搖做假模樣受天人禮拜供養尚未足意如此望久後生于化樂誠難得也龐居士云不與萬法為侶的是什麼人馬祖云待汝一口吸盡西江水卻向汝道若論此事豈得以小根小器小知小見而欲坐致太平現成受用龐老與麼問馬祖與麼答觀其開口發言立意處一模托出但擬心則無是處大解脫門無處不建大般若智無處不彰塵塵剎剎事事物物一一歷然無有一物一事一塵一剎而不頭頭相撞步步踏著如老僧不惜口業一時打破家當盡情搬出任學者千般若解脫田地上經行坐臥俯仰折旋喫飯著衣屙屎放尿得大自在得大受用若是上根利智聞山僧所說一肩負去孤峰頂上飽食高眠佛法世法都無一念即此都無一念處泊然無有一事一物為障為礙如此一念萬年萬年一念猶太虛空不與萬象森羅為礙豈不名絕學無為閑道人也世尊靈岳拈花迦葉當機發笑究其所以皆不出閑道人日用中學者果見箇下落將大藏教典總持機緣放下也得拈起也得頭頭上明物物上顯古人道青青翠竹盡是真如鬱鬱黃花無非般若其或不然且向己躬下究明生死此生死非從天降地湧乃當人于無量劫來不知不覺頭出頭沒以至今日苟不奮大力量大勇猛將箇四大五蘊通身打做一片下死志做工夫今日明日只是恁麼挨至眼光落地縱是大悲菩薩千眼放光千手提挈亦難代此生死之苦也豈不聞常人說木匠造枷自作自受慎之慎之如來出世為一大事因緣四十九年三百餘會塵說剎說說之不盡因甚古人教學者總不要看文字一切休去歇去單單提箇話頭如大死人一旦發明所得則頓見四十九年三百餘會盡是外事既是外事且釋迦老人面目向什麼處著落所以宗門下獨以超佛越祖為正見去此超佛越祖縱現大神通說過釋迦老人總無用處況學者些小學解文字貢高我慢乎老僧初不知所謂宗門下事凡見箇聰明伶俐人便信心向前請問終無一言感發後于坐中自家倒斷自作主宰古人箇箇說蒲團上豎起脊梁晝夜不放倒身十年二十年一生兩生只如此坐謂之坐禪我寧死依古人所教坐禪決不更改以此久久方得箇參悟省力處一切時中自然坐得徹豈敢惑人說我大徹大悟老僧不欺心真實與你等大家究竟務要做到超佛越祖田地庶不負參學之志也豈不思達磨初祖到少室面壁都無所為及二祖神光斷臂立雪祖云將心來與汝安神光答云覓心了不可得祖云吾為汝安心竟只此亦無所為後來人皆道祖師西來不立文字直指人心見性成佛六祖大師云不思善不思惡正恁麼時阿那個是明上座本來面目明言下大悟到此皆無一字學者欲造到古人田地須向生死岸頭談笑而化除此再無第二法臨濟和尚云汝等諸人赤肉團上有一無位真人的當甚的當檢點學者分上雖是移遠就近且不可認著其實只道得八成何謂佛祖分上始得學者分上不得自瞞老僧見學者箇箇所說禪定脫灑處人人似龍象蹴踏立在佛祖頭上不容一切及其與伊向痛處深錐痛劄無位真人手忙腳亂眼花心醉不知所以縱有所答亦猶方木圓孔學者切勿自執要以古人未悟之前死心做工夫處參究古人悟後方便垂手將箇蜜果放學者口裏學者不費工夫現成受用將謂自家的也是箇有道尊宿受人禮拜供養貪利養撥因果中峰和尚云妄談般若罪無涯項上先擔生鐵枷誠哉斯言也豈不知臨濟和尚三次問黃櫱三翻被打後到大愚參問又遭大愚訶責及悟復歸黃櫱櫱責大愚恨不痛與一頓始得古人豈容易得來雪峰三登投子九到洞山宗門之教燈燈相續祖祖相傳未是小事學者真箇受一段大苦廢寢忘餐三二十年抱此一志死中得活方許有箇說話處不然開口便擔生鐵之枷百千萬劫欲求脫去無有是處古德云山僧為汝發機卻有限不如山河大地一切音聲及自己心念所起乃是文殊普賢觀音妙門無一處不是自家寶所無一物不是自家珍藏無一方不是自己田地與麼則十方世界總為遮那法身一切眾生無一人不在裏許既在裏許為什麼事有不了處學者于禪定上以不動智精進堅固磨皮至肉磨肉至骨磨骨出髓盡百千萬劫看來看去以悟為期死中求活研磨到此田地便能入四生六道善惡淨穢之處說一味平等法上不見有佛下不見有眾生般若云一切智智清淨無二無二分無別無斷故佛祖為我等直恁老婆心切豈不得委任信受將一切所為放下覓箇受用于打鬨說雜話處大家較量遞相保護一法不為與麼挨究何患祖風不振己事不明老僧不畏罪福將佛祖百千萬劫受大苦惱一著大事拈來逼拶學者欲學者得大無礙禪定饑來喫飯困來打眠要行便行要坐便坐都無安排計較舉箇話頭任事不為空勞勞年久不易得大受用學者不信反為自害學聰明文字雜毒入心狂狂蕩蕩長篇闊賦牽引枝蔓以為一生所務不負于己據老僧看來通身錯了我出家人既離塵脫俗欲效佛祖當知空門之學究以生死若論生死豈有閒暇工夫求學文字言語諸子百氏之學雖至經天緯地不過世間功名富貴一旦數盡猶夢中事古德云名利擾攘褌中虱智識紛爭檻外猿誠哉是言世間最大唯生死耳富貴功名直得幾文學者去此別究皆生死苦本也吾門所貴絕知見解會如枯木頑石寒灰死火縱佛祖放百寶光明種種語言玄之又玄妙之又妙見與麼事聞與麼說正好當頭著棒令伊遠退方有參學之分其或不然將箇業識身心這邊經冬那邊過夏十年五載死不死活不活也說是箇久參禪和及將所參學的一段大事與伊定當都無一點分曉這等學者總是釋迦彌勒文殊普賢到來與伊說亦無下手處參學中此等之流如麻似粟祖風安保其復振哉永嘉和尚云外道聰明無智慧可不傷乎永嘉和尚云無明實性即佛性幻化空身即法身法身覺了無一物本源自性天真佛老僧多年發明有箇直截處直下與學者說破若或領略得去喚不回頭一念萬年萬年一念如此的當三世諸佛也索列在下風況諸方禪子奈得你何且道如何是老僧直截處老僧當時于無明起處觀彼十方法界一切眾生及彼蠢動含靈將箇無明所以處參尋佛性這裏則不見有佛性所以既無佛性則不可喚作無明無明佛性二俱假立以此參破十方諸佛一切眾生法身平等了無一物到這裏方見得婬怒癡即成定慧生死煩惱菩提涅槃無一無二學者若或信之依老僧說向自家心地上勘若勘破自家心地便佛祖受用舉心動念念念現前心心是佛到此正好入窮巖絕壑艸衣木食都無所慮挨到命根絕處撒手向前正如脫布衫上床摩枕放身安樂打眠宗門中從上古人例皆如是我輩若也貪染世事馳逐聲華波波挈挈不究生死大限到來眼光落地一場大苦那時若要似今日聞老僧與你等說佛祖所教其實難也古人悟後細密工夫所操守處孜孜兀兀猶勝未悟時念念恐有所失此事本無得失看來還要自來理會觀其所以卻與所見滯著處大段不同這裏方解古人所教轉入轉深高高峰頂立深深海底行他得的人自然丰彩天資迥常古德云鐵牛過窗櫺頭角四蹄都過得唯有尾巴過不得豈謂等閑老僧更有一說其或渾身和箇尾巴都過了還我公案來德山和尚示眾云道得三十棒道不得三十棒臨濟問侍者為什麼道得三十棒道不得三十棒若打接住送一送看如何侍者至彼理前問德山便打侍者接住送一送德山歸方丈侍者回舉似臨濟云我從來疑者漢雖然還見德山麼侍者擬議濟便打學者看古人方便通箇消息于臨濟德山用處討箇下落然後蒲團深藏機智或有箇不然漢看他又不是此等尋常知見卻要向德山臨濟未發機前坐他二老舌頭使有棒舉不起有口開不得老僧記得昔因二講主舉此機緣贈以偈云臨濟德山太潦艸古今天下何處計月照中山猿夜啼明暗色空依子卯講師講得講不得得與不得三十棒五音六律從渠唱所以問禪道佛法文章世諦總要當機利害處發明始得不然則吾道凌替老僧諦觀從上古德箇箇于此參學鮮有一人不受大苦行腳入門入室便受師家打罵千磨百難只是令伊無一點參禪氣息然後著伊喫茶參堂豈等閑立腳如今學者飽著一肚禪道我慢一味莽撞及其于未相見時計較百端不知心地所蘊盡是一團生死老僧曾與禪者說你等擔包負苦禮善知識究生死如禪者未見老僧及到此處動靜語言偷心伎量只此便是生死根本不如放下所來之念一味平等尋常都無計較伎倆從生至死這裏便是出生死處一大藏教千七百機無過教人如此老僧看來若論向上透關一著且不管你悟與未悟迷與未迷德山臨濟盡用古機總不出你當人一念之處思此添一事不得減一事不得大力量漢問老僧說一擔而去豈不慶快經云狂心不歇歇即菩提老僧久不會通宗達士嘗切切于懷恐負學者未審學者還負老僧也古人云是你負我是我負你到此看來卻是老僧負學者何謂老僧在浮山卻較些子老僧來牛首卻沒交涉然而千鈞之弩豈為鼷鼠發機此事于解路上看箇箇成佛成祖于見諦上看人人造業造罪老僧不說恐負你等這裏須具正眼透金剛圈吞栗棘蓬逢佛殺佛逢祖殺祖一切皆殺若有一事則禍事生要得乾淨和箇自己也殺之盡淨方始出得生死于這殺處苟存一念護惜則霄壤矣古人謂不是心不是佛不是物老僧與麼的實開說莫顧危亡于鑊湯爐炭碓搗舂磨不舉一念求出之心經百千劫方可論宗門事不然說箇即心即佛人人都會更說箇非心非佛學者也知若要端的向生死際譚笑脫去誠不敢望也譚玄說妙誣誷先聖聾瞽後生眼裏無筋皮下無血一盲引眾盲相牽入火坑豈虛言哉今時參學人如蠅子有些腥膻氣味便泊須與枯卻向無氣味處泊令安在平白地上從上作家宗師能為人者惟有睦州見你有坐地處便鏟卻從頭鏟將去宗師家要與學者遞究生死須是不順人情臨濟入門便喝德山入門便棒學者要到古人田地也須死得自己一片心地將古人受苦處向前一一經歷莫起一毫半進半退半信半疑之心拼命不顧生死如一人與萬人敵久久不覺磕著撞著猶十日並照豈不美哉如今學者目前世事境緣尚不能打點況生死乎他佛祖箇箇不容易得大抵將不容易得處拈學者頂上使學者依而行之離此再無別說十方諸佛說一大藏教令有情無情皆得平等出生死超佛祖洞見本地風光乃云一切眾生皆有如來智慧德相無明妄想不能證得楞嚴經云山河大地皆是妙明真心中所現物老僧看來忒殺慈悲八字打開把手交付學者不究此說于自家知見上強立知見博學多聞祇以記持得便是好處卻不信要了生死老僧且與評論只如我等所學無過阿難尚落邪思何況我等出家兒遠塵囂甘寂寞所究者只為生死生死既明將天上天下惟我獨尊生死未明任有富貴功名文章佛法振動寰宇古今無二總無用處大丈夫漢豈得貪一時之樂甘未劫之苦直下將所絆若名若利及與知見解會文章佛法禪道機緣一截截斷再不起第二念如臘月扇子任他無人覷著冷冰冰灰醭醭去一念萬年萬年一念忽若大事已明生死已斷便能超佛祖煆聖凡一切欺昧不得學者或做到與麼田地老僧見伊也索焚香稽首這一著子非小因緣若不具宿智縱遇真善知識傾腸倒腹和盤托出與伊不能承領忽若領略得去又不能保守成風成顛無有忌憚一味能所或然說著生死之難便乃佯然戲笑不念前途黑漫漫于欲死不死之際求生不得求死不得古人謂生龜退殼活牛剝皮豈不大苦若是真實要了生死的豈肯埋沒自己唐喪光陰直下舉一念如生鐵鑄就一切情緣境界盡情擯卻只向無字話頭心心念念綿綿密密打成一片外不見有山河大地人物風境內不見有佛祖機用玄妙知見只與麼去久久定有悟處又不得作悟會連箇前後迷悟都消殞盡然後將佛祖言教一一印之似空合空猶水投水如鏡照鏡以心印心到這裏都無隔閡塵塵爾剎剎爾左右逢源死生無礙于此喚作那伽大定縱終日行未嘗動一步終日說未嘗發一言參學人若不親到此箇田地舉心動念盡成生死了也
